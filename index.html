          .setInteractive();
        useBtn.on('pointerdown',()=>{
          if(k==='heal')player.heal();
          else if(k==='rope')player.placeRope(this.scene.get('World').mapData);
          else if(k==='bomb')player.useBomb(this.scene.get('World').mapData);
          else if(k==='beacon'){player.removeItem('beacon');player.sprite.setPosition(Math.floor(MW/2)*TS,8*TS);}
          this.openInventoryMenu(player);
        });
        this.menuContainer.add(useBtn);
      }
      y+=26;
      if(y>ph-40)break;
    }
    const closeBtn=this.add.text(pw-10,8,'✕',{fontSize:'18px',color:'#FF4444',fontFamily:'monospace'}).setOrigin(1,0).setInteractive();
    closeBtn.on('pointerdown',()=>this._closeMenuAndWorld());
    this.menuContainer.add(closeBtn);
  }

  openWarehouseMenu(trophies){
    this.menuOpen=true;
    this._clearMenu();
    const W=this.W,H=this.H;
    const pw=Math.min(520,W-20),ph=Math.min(420,H-20);
    const px=(W-pw)/2,py=(H-ph)/2;
    this.menuContainer=this.add.container(px,py).setDepth(200);
    const bg=this.add.graphics();
    bg.fillStyle(0x1a1000,0.97);bg.fillRoundedRect(0,0,pw,ph,12);
    bg.lineStyle(2,0xDAA520,1);bg.strokeRoundedRect(0,0,pw,ph,12);
    this.menuContainer.add(bg);
    this.menuContainer.add(this.add.text(pw/2,16,'🏆 戦利品の間',{fontSize:'18px',color:'#DAA520',fontFamily:'monospace'}).setOrigin(.5));
    this.menuContainer.add(this.add.text(pw/2,38,`Day ${GS.day-1}  累計稼ぎ: ${GS.totalEarned}G  最深: ${GS.deepestReached}m  クエスト: ${GS.questsDone}`,
      {fontSize:'11px',color:'#AAA',fontFamily:'monospace'}).setOrigin(.5));

    if(trophies.length===0){
      this.menuContainer.add(this.add.text(pw/2,ph/2-20,'まだ戦利品はない\n地下でレアアイテムを売却すると飾られる',
        {fontSize:'13px',color:'#666',fontFamily:'monospace',align:'center'}).setOrigin(.5));
    } else {
      // アイテムをグリッド表示 (アイコン付き)
      const counts={};
      for(const t of trophies)counts[t]=(counts[t]||0)+1;
      let col=0, row=0;
      const cellW=pw/4, cellH=70, startY=60;
      for(const[k,v]of Object.entries(counts)){
        const cx=col*cellW+cellW/2, cy=startY+row*cellH;
        // 背景セル
        const cellBg=this.add.graphics();
        cellBg.fillStyle(ITEMS[k]?.rare?0x332200:0x221100,.8);
        cellBg.fillRoundedRect(col*cellW+4,cy-14,cellW-8,cellH-4,6);
        this.menuContainer.add(cellBg);
        // アイテム画像 or 色丸
        const imgKey=k.startsWith('ore_')?k:(k+'_item');
        if(this.scene.get('World')?.textures?.exists(imgKey)){
          const img=this.add.image(cx,cy+4,imgKey).setScale(0.12).setOrigin(.5);
          this.menuContainer.add(img);
        } else {
          const dot=this.add.circle(cx,cy+4,14,parseInt((ITEMS[k]?.col||'#FFD700').replace('#',''),16));
          this.menuContainer.add(dot);
        }
        this.menuContainer.add(this.add.text(cx,cy+26,ITEMS[k]?.name||k,
          {fontSize:'10px',color:ITEMS[k]?.rare?'#FFD700':'#CCC',fontFamily:'monospace'}).setOrigin(.5));
        this.menuContainer.add(this.add.text(cx,cy+40,'×'+v,
          {fontSize:'12px',color:'#FFF',fontFamily:'monospace'}).setOrigin(.5));
        col++;
        if(col>=4){col=0;row++;}
      }
    }
    // ボス撃破トロフィー
    if(GS.bossDefeated){
      this.menuContainer.add(this.add.text(pw/2,ph-50,'💀 ボス撃破 達成！',
        {fontSize:'14px',color:'#FF4444',fontFamily:'monospace',stroke:'#000',strokeThickness:2}).setOrigin(.5));
    }
    const closeBtn=this.add.text(pw-10,8,'✕',{fontSize:'18px',color:'#FF4444',fontFamily:'monospace'}).setOrigin(1,0).setInteractive();
    closeBtn.on('pointerdown',()=>this._closeMenuAndWorld());
    this.menuContainer.add(closeBtn);
  }

  closeMenu(){this._clearMenu();}

  _clearMenu(){
    this.menuOpen=false;
    if(this.menuContainer){this.menuContainer.destroy(true);this.menuContainer=null;}
  }

  _closeMenuAndWorld(){
    this._clearMenu();
    const world=this.scene.get('World');
    if(world){world.openMenu=null;world._resumePhysicsFromMenu();}
  }
}

// ================================================================
// SCENE: SUMMARY (end of day)
// ================================================================
class SummaryScene extends Phaser.Scene{
  constructor(){super('Summary');}
  init(d){this.data2=d;}
  create(){
    const W=this.scale.width,H=this.scale.height;
    const d=this.data2;

    this.add.rectangle(W/2,H/2,W,H,0x0a0a1e);
    this.add.text(W/2,40,`Day ${d.day} 終了！`,{fontSize:Math.min(36,W/14)+'px',color:'#FFD700',fontFamily:'monospace',stroke:'#000',strokeThickness:4}).setOrigin(.5);

    let y=100;
    this.add.text(W/2,y,`💰 共有ゴールド: ${GS.gold}G`,{fontSize:'18px',color:'#FFD700',fontFamily:'monospace'}).setOrigin(.5);
    y+=36;
    this.add.text(W/2,y,`📍 最深到達: ${GS.deepestReached}m`,{fontSize:'16px',color:'#AADDFF',fontFamily:'monospace'}).setOrigin(.5);
    y+=30;

    // Player summaries
    d.players.forEach((p,i)=>{
      y+=10;
      this.add.text(W/2,y,`P${i+1} 最深: ${p.deepest}m`,
        {fontSize:'14px',color:i===0?'#88AAFF':'#FF8866',fontFamily:'monospace'}).setOrigin(.5);
      y+=24;
    });

    // Quest results
    y+=10;
    this.add.text(W/2,y,'クエスト結果:',{fontSize:'14px',color:'#FF8844',fontFamily:'monospace'}).setOrigin(.5);
    y+=26;
    for(const q of d.quests){
      this.add.text(W/2,y,`${q.done?'✅':'❌'} ${q.text} +${q.done?q.reward:0}G`,
        {fontSize:'12px',color:q.done?'#44FF44':'#888',fontFamily:'monospace'}).setOrigin(.5);
      y+=22;
    }

    // Accomplishments
    if(GS.mapPieces>0){
      y+=10;
      this.add.text(W/2,y,`🗺️ 地図の欠片: ${GS.mapPieces}/5`,{fontSize:'13px',color:'#FFFF00',fontFamily:'monospace'}).setOrigin(.5);
      y+=24;
    }
    if(GS.bossDefeated){
      y+=6;
      this.add.text(W/2,y,'💀 ボス撃破済！',{fontSize:'16px',color:'#FF4444',fontFamily:'monospace',stroke:'#000',strokeThickness:2}).setOrigin(.5);
      y+=28;
    }
    // 深さランキング
    y+=6;
    this.add.text(W/2,y,`🏆 累計最深記録: ${GS.deepestReached}m`,{fontSize:'13px',color:'#AAD4FF',fontFamily:'monospace'}).setOrigin(.5);
    y+=22;
    this.add.text(W/2,y,`📊 総稼ぎ: ${GS.totalEarned}G`,{fontSize:'13px',color:'#FFD700',fontFamily:'monospace'}).setOrigin(.5);
    y+=22;
    this.add.text(W/2,y,`📋 完了クエスト: ${GS.questsDone}`,{fontSize:'13px',color:'#FF8844',fontFamily:'monospace'}).setOrigin(.5);
    y+=22;

    y+=20;
    GS.day++;
    // クリア条件: 最深部到達(240m以上) or ボス撃破
    if(GS.bossDefeated||GS.deepestReached>=240){
      this.cameras.main.flash(800,255,215,0);
      this.add.text(W/2,y,'🎉 目標達成！謎の地下施設を解明！',{fontSize:Math.min(18,W/28)+'px',color:'#FFD700',fontFamily:'monospace',stroke:'#000',strokeThickness:3}).setOrigin(.5);
      y+=36;
      this.add.text(W/2,y,'「地下の正体は古代文明の自動採掘機だった...」',{fontSize:'11px',color:'#AAA',fontFamily:'monospace'}).setOrigin(.5);
      y+=28;
    } else if(GS.day>GS.maxDay){
      this.add.text(W/2,y,`Day ${GS.maxDay} 終了 - ${GS.deepestReached}m到達`,{fontSize:'15px',color:'#AAA',fontFamily:'monospace'}).setOrigin(.5);
      y+=28;
    }

    // Next day button
    const nextBtn=this.add.text(W/2,Math.min(y,H-60),'▶ 次の日へ',
      {fontSize:'22px',color:'#000',backgroundColor:'#FFD700',padding:{x:24,y:12},fontFamily:'monospace'})
      .setOrigin(.5).setInteractive();
    nextBtn.on('pointerover',()=>nextBtn.setBackgroundColor('#FFA500'));
    nextBtn.on('pointerout', ()=>nextBtn.setBackgroundColor('#FFD700'));
    nextBtn.on('pointerdown',()=>{
      // Give each player starting supplies for next day
      this.scene.start('World',{numPlayers:d.players.length});
    });
    this.input.keyboard.once('keydown-ENTER',()=>this.scene.start('World',{numPlayers:d.players.length}));
    this.input.keyboard.once('keydown-SPACE', ()=>this.scene.start('World',{numPlayers:d.players.length}));
  }
}

const config={
  type:Phaser.AUTO,
  backgroundColor:'#0a0a1e',
  physics:{
    default:'arcade',
    arcade:{gravity:{y:600},debug:false},
  },
  scene:[BootScene,TitleScene,WorldScene,UIScene,SummaryScene],

    autoCenter: Phaser.Scale.CENTER_BOTH,
    parent: 'game-container',
    expandParent: true,
  },
  render:{antialias:false,pixelArt:true},
};

const game=new Phaser.Game(config);
window._phaserGame=game;

// フルスクリーン対応: 最初のタッチ/クリックでフルスクリーン要求
function requestFS(){
  const el=document.documentElement;
  const req=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen;
  if(req){req.call(el).catch(()=>{});}
  // iOS Safari: スクロール無効化 (既にCSS設定済み)
  document.removeEventListener('touchstart',requestFS);
  document.removeEventListener('click',requestFS);
}
document.addEventListener('touchstart',requestFS,{once:true,passive:true});
document.addEventListener('click',requestFS,{once:true});

// VisualViewport対応 (ノッチ・セーフエリア)
function updateViewport(){
  const vv=window.visualViewport;
  if(!vv)return;
  const c=document.querySelector('canvas');
  if(!c)return;
  c.style.width=vv.width+'px';
  c.style.height=vv.height+'px';
  c.style.left=vv.offsetLeft+'px';
  c.style.top=vv.offsetTop+'px';
}
if(window.visualViewport){
  window.visualViewport.addEventListener('resize',updateViewport);
  window.visualViewport.addEventListener('scroll',updateViewport);
}
window.addEventListener('resize',()=>{
  updateViewport();
});

// Phaser Scale.RESIZE handles resize automatically, but fallback just in case
window.addEventListener('resize',()=>{
  // Scale.RESIZE does this automatically
});
</script>
