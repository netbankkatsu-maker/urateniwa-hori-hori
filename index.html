// ================================================================
// SEEDED RNG (mulberry32)
// ================================================================
function mkRNG(seed){
  let s=seed|0;
  return function(){
    s=(s+0x6d2b79f5)|0;
    let t=Math.imul(s^(s>>>15),1|s);
    t=(t+Math.imul(t^(t>>>7),61|t))^t;
    return((t^(t>>>14))>>>0)/4294967296;
  };
}

// ================================================================
// MAP GENERATOR
// ================================================================
function generateMap(seed){
  const rng=mkRNG(seed);
  const map=[];
  for(let y=0;y<MH;y++){map[y]=new Uint8Array(MW);}

  function set(x,y,t){if(x>=0&&x<MW&&y>=0&&y<MH)map[y][x]=t;}
  function get(x,y){if(x<0||x>=MW||y<0||y>=MH)return T.BEDROCK;return map[y][x];}

  // Fill based on biome
  for(let y=0;y<MH;y++){
    for(let x=0;x<MW;x++){
      const b=getBiome(y);
      if(y<BIOMES[0].y1){
        // surface: air above grass
        map[y][x]=y<BIOMES[0].y1-1?T.AIR:T.GRASS;
      } else {
        map[y][x]=biomeBaseBlock(b,y,rng);
      }
    }
  }

  // Bedrock border
  for(let y=0;y<MH;y++){
    map[y][0]=T.BEDROCK; map[y][MW-1]=T.BEDROCK;
  }
  for(let x=0;x<MW;x++){
    map[MH-1][x]=T.BEDROCK; map[MH-2][x]=T.BEDROCK;
  }

  // Carve caves
  for(let c=0;c<25;c++){
    let cx=Math.floor(rng()*MW*0.8)+4;
    let cy=Math.floor(rng()*(MH-40))+20;
    const steps=40+Math.floor(rng()*80);
    for(let s=0;s<steps;s++){
      const r=Math.floor(rng()*2)+1;
      for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){
        const t=get(cx+dx,cy+dy);
        if(t!==T.BEDROCK&&t!==T.LAVA&&t!==T.WATER){set(cx+dx,cy+dy,T.AIR);}
      }
      const d=rng();
      if(d<.25)cx=Math.max(2,cx-1);
      else if(d<.5)cx=Math.min(MW-3,cx+1);
      else if(d<.75)cy=Math.max(12,cy-1);
      else cy=Math.min(MH-5,cy+1);
    }
  }

  // Place ores per biome
  placeOres(map,rng);

  // Place chests
  for(let i=0;i<40;i++){
    const x=2+Math.floor(rng()*(MW-4));
    const y=15+Math.floor(rng()*(MH-20));
    if(get(x,y)===T.AIR&&get(x,y+1)!==T.AIR){set(x,y,T.CHEST);}
  }

  // Place switches+doors (co-op gimmick)
  for(let i=0;i<8;i++){
    const x=10+Math.floor(rng()*(MW-20));
    const y=30+Math.floor(rng()*(MH-50));
    if(get(x,y)===T.AIR&&get(x,y+1)!==T.AIR){
      set(x,y,T.SW_OFF);
      // door nearby
      const dx2=x+(rng()>0.5?5:-5);
      for(let ddy=0;ddy<8;ddy++){set(dx2,y+ddy,T.DOOR_C);}
    }
  }

  // Underground lake biome: fill with water
  const lb=BIOMES[5];
  for(let y=lb.y0+5;y<lb.y1-5;y++){
    for(let x=2;x<MW-2;x++){
      if(get(x,y)===T.AIR&&y>lb.y0+10){set(x,y,T.WATER);}
    }
  }

  // Lava in magma biome
  const mb=BIOMES[7];
  for(let y=mb.y1-8;y<mb.y1-2;y++){
    for(let x=2;x<MW-2;x++){set(x,y,T.LAVA);}
  }
  // Lava pools
  for(let i=0;i<15;i++){
    const x=5+Math.floor(rng()*(MW-10));
    const y=mb.y0+Math.floor(rng()*(mb.y1-mb.y0-10));
    if(get(x,y)===T.AIR){
      for(let dy=0;dy<3;dy++)for(let dx=-2;dx<=2;dx++)set(x+dx,y+dy,T.LAVA);
    }
  }

  // Gas pockets
  for(let i=0;i<20;i++){
    const x=5+Math.floor(rng()*(MW-10));
    const y=50+Math.floor(rng()*(150));
    if(get(x,y)===T.AIR){
      for(let dy=0;dy<4;dy++)for(let dx=-3;dx<=3;dx++){
        if(get(x+dx,y+dy)===T.AIR)set(x+dx,y+dy,T.GAS);
      }
    }
  }

  // Ancient ruin structures
  const arb=BIOMES[6];
  for(let i=0;i<6;i++){
    const rx=5+Math.floor(rng()*(MW-10));
    const ry=arb.y0+5+Math.floor(rng()*(arb.y1-arb.y0-10));
    buildRuin(map,rx,ry,rng,set,get);
  }

  // Stalactites
  for(let y=20;y<200;y++){
    for(let x=2;x<MW-2;x++){
      if(get(x,y)!==T.AIR&&get(x,y+1)===T.AIR&&rng()<.06){
        for(let dy=1;dy<=Math.floor(rng()*4)+1;dy++){
          if(get(x,y+dy)===T.AIR)set(x,y+dy,T.STALA);else break;
        }
      }
    }
  }

  // Mushrooms in deep areas
  for(let y=160;y<260;y++){
    for(let x=2;x<MW-2;x++){
      if(get(x,y)===T.AIR&&get(x,y+1)!==T.AIR&&rng()<.03)set(x,y,T.MUSHROOM);
    }
  }

  // Surface structures (left side surface)
  buildSurface(map,set,get);

  // Elevator shaft (center)
  const elevX=Math.floor(MW/2);
  for(let y=BIOMES[0].y1;y<MH-3;y++){set(elevX,y,T.ELEV);}

  return map;
}

function getBiome(y){
  for(let i=BIOMES.length-1;i>=0;i--){
    if(y>=BIOMES[i].y0)return BIOMES[i];
  }
  return BIOMES[0];
}

function biomeBaseBlock(biome,y,rng){
  const n=biome.name;
  if(n==='浅い土')return rng()<.05?T.COPPER:T.DIRT;
  if(n==='岩盤層')return rng()<.02?T.COPPER:(rng()<.02?T.IRON:T.STONE);
  if(n==='鉱山層')return rng()<.03?T.IRON:(rng()<.015?T.GOLD:T.STONE);
  if(n==='化石層')return rng()<.04?T.FOSSIL:(rng()<.01?T.GOLD:T.HARD);
  if(n==='地下湖')return T.STONE;
  if(n==='古代遺跡')return rng()<.02?T.ANCIENT:T.ANWALL;
  if(n==='マグマ層')return rng()<.02?T.MAGMASTONE:(rng()<.01?T.GEM:T.HARD);
  if(n==='最深部')return rng()<.015?T.DEEPCRYSTAL:(rng()<.01?T.MACHINE:(rng()<.005?T.UNK_ORE:T.HARD));
  return T.STONE;
}

  const oreTable=[

    {tile:T.IRON,   ymin:40,ymax:130, chance:.04},
    {tile:T.GOLD,   ymin:80,ymax:200, chance:.02},
    {tile:T.GEM,    ymin:120,ymax:280,chance:.015},
    {tile:T.FOSSIL, ymin:130,ymax:180,chance:.05},
    {tile:T.CRYSTAL,ymin:160,ymax:220,chance:.03},
    {tile:T.ANCIENT,ymin:190,ymax:230,chance:.02},
    {tile:T.MACHINE,ymin:240,ymax:300,chance:.015},
    {tile:T.UNK_ORE,ymin:270,ymax:315,chance:.008},
    {tile:T.DEEPCRYSTAL,ymin:260,ymax:315,chance:.01},
    {tile:T.MAGMASTONE,ymin:220,ymax:260,chance:.04},
  ];
  for(const ore of oreTable){
    for(let y=ore.ymin;y<ore.ymax;y++){
      for(let x=1;x<MW-1;x++){
        if(map[y][x]===T.STONE||map[y][x]===T.HARD||map[y][x]===T.DIRT){
          if(rng()<ore.chance){
            // place vein 1-4 tiles
            const vs=1+Math.floor(rng()*3);
            for(let i=0;i<vs;i++){
              const ox=x+Math.floor(rng()*3)-1;
              const oy=y+Math.floor(rng()*3)-1;
              if(ox>0&&ox<MW-1&&oy>0&&oy<MH-1){
                const bt=map[oy][ox];
                if(bt===T.STONE||bt===T.HARD||bt===T.DIRT)map[oy][ox]=ore.tile;
              }
            }
          }
        }
      }
    }
  }
}

function buildRuin(map,rx,ry,rng,set,get){
  const w=6+Math.floor(rng()*6), h=4+Math.floor(rng()*4);
  // walls
  for(let dy=0;dy<h;dy++){
    set(rx,ry+dy,T.ANWALL); set(rx+w,ry+dy,T.ANWALL);
  }
  for(let dx=0;dx<=w;dx++){
    set(rx+dx,ry,T.ANWALL); set(rx+dx,ry+h,T.ANWALL);
  }
  // hollow inside
  for(let dy=1;dy<h;dy++)for(let dx=1;dx<w;dx++)set(rx+dx,ry+dy,T.AIR);
  // door opening
  set(rx+Math.floor(w/2),ry+h,T.AIR);
  // machine parts or ancient items inside
  for(let i=0;i<3;i++){
    const ix=rx+1+Math.floor(rng()*(w-1));
    const iy=ry+1+Math.floor(rng()*(h-1));
    set(ix,iy,rng()<.5?T.ANCIENT:T.MACHINE);
  }
}

function buildSurface(map,set,get){
  const sy=BIOMES[0].y1-1; // grass level
  // Clear surface area
  for(let y=0;y<sy;y++)for(let x=2;x<MW-2;x++)map[y][x]=T.AIR;
  for(let x=2;x<MW-2;x++)map[sy][x]=T.GRASS;

  // Ground floor
  for(let x=2;x<MW-2;x++){
    map[sy+1][x]=T.DIRT; map[sy+2][x]=T.DIRT;
  }

  // Buildings (all at grass level)
  // House (x=4)
  buildBuilding(map,set,4,sy-3,5,3,T.PLATFORM);
  // Sell shop (x=12)
  buildBuilding(map,set,12,sy-3,5,3,T.PLATFORM);
  // Upgrade shop (x=20)
  buildBuilding(map,set,20,sy-3,5,3,T.PLATFORM);
  // Warehouse (x=28)
  buildBuilding(map,set,28,sy-3,6,3,T.PLATFORM);
  // Craft table (x=37)
  buildBuilding(map,set,37,sy-3,5,3,T.PLATFORM);
  // Quest board (x=45)
  buildBuilding(map,set,45,sy-3,4,3,T.PLATFORM);
  // Generator (x=53)
  buildBuilding(map,set,53,sy-2,3,2,T.PLATFORM);
  // Oxygen station (x=59)
  buildBuilding(map,set,59,sy-2,3,2,T.PLATFORM);
}

function buildBuilding(map,set,x,y,w,h,wallTile){
  for(let dy=0;dy<h;dy++){
    set(x,y+dy,wallTile); set(x+w-1,y+dy,wallTile);
    for(let dx=1;dx<w-1;dx++)set(x+dx,y+dy,T.AIR);
  }
  for(let dx=0;dx<w;dx++){set(x+dx,y,wallTile); set(x+dx,y+h-1,wallTile);}
  // door at bottom center
  set(x+Math.floor(w/2),y+h-1,T.AIR);
}

// ================================================================
// VIRTUAL PAD (mobile)
// ================================================================
class VirtualPad{
  /**
   * スマホ用バーチャルパッド
   * - 左側: 半透明の大きな十字キー (D-pad)
   * - 右側: ⛏掘るボタン、🧨爆弾、🪢ロープ、🏠帰還の4ボタン
   * - 最小サイズ60px
   */
  constructor(scene, baseX, baseY, playerId){
    this.scene=scene; this.pid=playerId;
    this.dx=0; this.dy=0; this.dig=false; this.ret=false;
    this.bomb=false; this.rope=false; this.heal=false;
    this.pointers=new Map();
    this._stick={x:baseX,y:baseY}; // 現在のスティック位置

    const W=scene.scale.width, H=scene.scale.height;

    // 2人プレイ時: P1が上半分、P2が下半分に配置
    // 単独プレイ時: 下部全体に配置
    // baseX/baseY はWorldScene側で調整済み

    // D-pad: 大きな円 (radius=70)
    const DPR=70;
    this.dpX=baseX; this.dpY=baseY; this.dpR=DPR;

    // 右側ボタングループ: baseXの右側にまとめて配置
    // P1: 右エリアは W の右半分、P2: 右エリアは W の右端
    const isP2 = (playerId===1);
    // ボタンのベース位置: D-padの右側 (画面を均等に分けた右エリア)
    const btnAreaRight = isP2 ? W - 18 : W/2 - 18;
    const btnAreaCenterX = btnAreaRight - 70;
    const btnAreaCenterY = baseY;
    // ダイヤモンド配置: 上=爆弾 下=帰還 左=ロープ 右(大)=掘る
    this.digBtn ={x:btnAreaRight-30,  y:btnAreaCenterY,     r:42, col:0xFF4422, label:'⛏'};
    this.bombBtn={x:btnAreaCenterX,   y:btnAreaCenterY-55,  r:32, col:0xFF8800, label:'💣'};
    this.ropeBtn={x:btnAreaCenterX,   y:btnAreaCenterY+55,  r:32, col:0xDEB887, label:'🪢'};
    this.retBtn ={x:btnAreaCenterX-60,y:btnAreaCenterY,     r:32, col:0x4488FF, label:'🏠'};

    this._buttons=[
      {btn:this.digBtn,  key:'dig'},
      {btn:this.bombBtn, key:'bomb'},
      {btn:this.ropeBtn, key:'rope'},
      {btn:this.retBtn,  key:'ret'},
    ];

    // グラフィックス描画
    const g=scene.add.graphics().setScrollFactor(0).setDepth(200);
    this.gfx=g;
    this._drawPad();

    // テキストラベル格納
    this._labels=[];
    this._drawLabels();

    // スティックグラフィック
    this.stickGfx=scene.add.graphics().setScrollFactor(0).setDepth(202);
    this._drawStick();

    // タッチリスナー
    scene.input.on('pointerdown',this._down,this);
    scene.input.on('pointermove',this._move,this);
    scene.input.on('pointerup',this._up,this);
  }

  _drawPad(){
    const g=this.gfx; g.clear();

    // D-pad背景: 半透明の大きな円
    g.fillStyle(0x000000,0.35); g.fillCircle(this.dpX,this.dpY,this.dpR);
    g.lineStyle(2,0xFFFFFF,0.3); g.strokeCircle(this.dpX,this.dpY,this.dpR);

    // D-pad 十字矢印ガイド (半透明)
    const r=this.dpR*0.55;
    g.lineStyle(2,0xFFFFFF,0.25);
    [[0,-r],[0,r],[-r,0],[r,0]].forEach(([dx,dy])=>{
      g.beginPath();
      g.moveTo(this.dpX,this.dpY);
      g.lineTo(this.dpX+dx,this.dpY+dy);
      g.strokePath();
    });
    // 方向矢印
    g.fillStyle(0xFFFFFF,0.35);
    const ar=10, aw=6;
    // 上
    g.fillTriangle(this.dpX,this.dpY-r-ar, this.dpX-aw,this.dpY-r+2, this.dpX+aw,this.dpY-r+2);
    // 下
    g.fillTriangle(this.dpX,this.dpY+r+ar, this.dpX-aw,this.dpY+r-2, this.dpX+aw,this.dpY+r-2);
    // 左
    g.fillTriangle(this.dpX-r-ar,this.dpY, this.dpX-r+2,this.dpY-aw, this.dpX-r+2,this.dpY+aw);
    // 右
    g.fillTriangle(this.dpX+r+ar,this.dpY, this.dpX+r-2,this.dpY-aw, this.dpX+r-2,this.dpY+aw);

    // アクションボタン
    for(const {btn} of this._buttons){
      g.fillStyle(btn.col,0.55); g.fillCircle(btn.x,btn.y,btn.r);
      g.lineStyle(2,0xFFFFFF,0.4); g.strokeCircle(btn.x,btn.y,btn.r);
    }
  }

  _drawLabels(){
    // ラベル削除してから再描画
    this._labels.forEach(l=>l.destroy());
    this._labels=[];
    for(const {btn} of this._buttons){
      const t=this.scene.add.text(btn.x,btn.y,btn.label,{fontSize:'22px'})
        .setOrigin(.5).setScrollFactor(0).setDepth(203);
      this._labels.push(t);
    }
    // P番号
    const pLabel=this.scene.add.text(this.dpX,this.dpY-this.dpR-18,
      this.pid===0?'P1':'P2',
      {fontSize:'11px',color:this.pid===0?'#88AAFF':'#FF8866',
       fontFamily:'monospace',backgroundColor:'#0008',padding:{x:3,y:1}})
      .setOrigin(.5).setScrollFactor(0).setDepth(203);
    this._labels.push(pLabel);
  }

  _drawStick(){
    const g=this.stickGfx; g.clear();
    const sx=this.dpX+this.dx*this.dpR*0.5;
    const sy=this.dpY+this.dy*this.dpR*0.5;
    g.fillStyle(0xFFFFFF,0.6); g.fillCircle(sx,sy,24);
    g.lineStyle(2,0xFFFFFF,0.8); g.strokeCircle(sx,sy,24);
  }

  _down(p){
    const {x,y}=p;
    if(this._inDp(x,y)){
      this.pointers.set(p.id,{type:'dp',x,y});
      this._updateDp(x,y);
    } else {
      for(const {btn,key} of this._buttons){
        if(this._inBtn(x,y,btn)){
          this[key]=true;
          this.pointers.set(p.id,{type:key});
          this._highlightBtn(btn,true);
          break;
        }
      }
    }
  }

  _move(p){
    const t=this.pointers.get(p.id);
    if(t&&t.type==='dp'){this._updateDp(p.x,p.y);}
  }

  _up(p){
    const t=this.pointers.get(p.id);
    if(t){
      if(t.type==='dp'){this.dx=0;this.dy=0;this._drawStick();}
      else {this[t.type]=false;}
      this.pointers.delete(p.id);
    }
  }

  _highlightBtn(btn,on){
    // ボタン押下時の視覚フィードバック (スケールは変えられないのでalpha変更)
    this.gfx.fillStyle(btn.col, on?0.9:0.55);
    this.gfx.fillCircle(btn.x,btn.y,btn.r);
  }

  _inDp(x,y){return Math.hypot(x-this.dpX,y-this.dpY)<this.dpR+24;}
  _inBtn(x,y,b){return Math.hypot(x-b.x,y-b.y)<b.r+12;}

  _updateDp(x,y){
    const dx=x-this.dpX, dy=y-this.dpY;
    const d=Math.hypot(dx,dy);
    if(d<8){this.dx=0;this.dy=0;}
    else{
      const nx=dx/d, ny=dy/d;
      this.dx=Math.abs(nx)>0.25?Math.sign(nx):0;
      this.dy=Math.abs(ny)>0.35?Math.sign(ny):0;
    }
    this._drawStick();
  }

  destroy(){
    this.scene.input.off('pointerdown',this._down,this);
    this.scene.input.off('pointermove',this._move,this);
    this.scene.input.off('pointerup',this._up,this);
    this.gfx.destroy();
    this.stickGfx.destroy();
    this._labels.forEach(l=>l.destroy());
  }
}

// ================================================================
// PLAYER CLASS
// ================================================================
class Player{
  constructor(scene,x,y,id){
    this.scene=scene; this.id=id;
    this.hp=100; this.maxHp=100;
    this.stamina=100; this.maxStamina=100;
    this.oxygen=100; this.maxOxygen=100;
    this.battery=100; this.maxBattery=100;
    this.weight=0; this.maxWeight=30;
    this.mineSpeed=1; this._baseMineSpeed=1; this.moveSpeed=160;
    this.lightRange=180;
    this.inventory={}; // item->count
    this.gold=0;
    this.downed=false; this.downTimer=0;
    this.rescueTimer=0;
    this.tool='pickaxe'; // pickaxe|drill|bomb
    this.mineTarget=null; this.mineProgress=0;
    this.onGround=false;
    this.facingRight=id===0;
    this.upgrades={hp:0,stamina:0,weight:0,speed:0,light:0,pickaxe:0,drill:0,bomb:0,range:0};
    this.deepest=0;
    this.activeItem=null;

    // プレイヤースプライト (アセット画像 or フォールバック)
    const texKey = scene.textures.exists('player_idle') ? 'player_idle' : null;
    if(texKey){
      this.sprite = scene.physics.add.sprite(x, y, 'player_idle');
      // P2は色合いを変える
      if(id===1) this.sprite.setTint(0xFF9966);
      this.sprite.setScale(0.28);
      // アルファブレンドで背景グリッドを隠す
      this.sprite.setAlpha(1);
      this.sprite.setPipelineData('forceZeroTVerts', false);
    } else {
      const col=id===0?0x4488FF:0xFF6644;
      const g=scene.add.graphics();
      g.fillStyle(col);g.fillRect(0,0,24,28);
      g.fillStyle(0xFFFFFF);g.fillRect(id===0?14:2,4,8,8);
      g.fillStyle(0x000000);g.fillRect(id===0?16:4,6,4,4);
      g.generateTexture('p'+id,24,28);g.destroy();
      this.sprite=scene.physics.add.sprite(x,y,'p'+id);
    }
    this.sprite.setCollideWorldBounds(false);
    this.sprite.body.setSize(24,28);
    this.sprite.setDepth(10);

    // アニメーション状態
    this._animState='idle'; this._animTimer=0; this._animFrame=0;
    this._walkFrames=['player_walk1','player_walk2','player_walk3','player_walk4'];
    this._digFrames=['player_dig1','player_dig2','player_dig3','player_dig4'];
    this._jumpFrames=['player_jump1','player_jump2','player_jump3'];
    this._downFrames=['player_down1'];
    this._pickFrames=['player_pick1','player_pick2','player_pick3'];

    // Name tag
    this.nameTag=scene.add.text(x,y-20,id===0?'P1':'P2',
      {fontSize:'10px',color:id===0?'#88AAFF':'#FF8866',backgroundColor:'#000000AA',padding:{x:2,y:1}})
      .setOrigin(.5).setDepth(11);

    this.digAnim=0; // mining animation timer
  }

  addItem(id,qty){
    const def=ITEMS[id]; if(!def)return false;
    const add=Math.min(qty,Math.floor((this.maxWeight-this.weight)/def.w));
    if(add<=0)return false;
    this.inventory[id]=(this.inventory[id]||0)+add;
    this.weight+=add*def.w;
    return true;
  }

  removeItem(id,qty=1){
    if(!this.inventory[id]||this.inventory[id]<qty)return false;
    this.inventory[id]-=qty;
    if(this.inventory[id]<=0)delete this.inventory[id];
    this.weight-=qty*(ITEMS[id]?.w||0);
    if(this.weight<0)this.weight=0;
    return true;
  }

  sellAll(){
    let earned=0;
    const mult=1+GS.baseLevel.sell*0.1;
    for(const[k,v]of Object.entries(this.inventory)){
      if(ITEMS[k]&&ITEMS[k].sell>0){
        earned+=Math.floor(v*ITEMS[k].sell*mult);
        delete this.inventory[k];
      }
    }
    this.weight=Object.entries(this.inventory).reduce((s,[k,v])=>s+(ITEMS[k]?.w||0)*v,0);
    GS.gold+=earned; GS.totalEarned+=earned;
    return earned;
  }

  totalWeight(){
    return Object.entries(this.inventory).reduce((s,[k,v])=>s+(ITEMS[k]?.w||0)*v,0);
  }

  update(dt,keys,pad,map){
    if(this.downed){this._updateDowned(dt,map);return;}

    const spd=this.moveSpeed*(this.downed?0:1);
    let vx=0,vy=this.sprite.body.velocity.y;

    // Input
    const left =keys.left  ||(pad&&pad.dx<0);
    const right=keys.right ||(pad&&pad.dx>0);
    const up   =keys.up    ||(pad&&pad.dy<0);
    const dig  =keys.dig   ||(pad&&pad.dig);
    const ret  =keys.ret   ||(pad&&pad.ret);
    // バーチャルパッドのアクションボタン処理
    if(pad&&pad.bomb&&!this._padBombPrev){this.useBomb(this.scene.mapData);}
    if(pad&&pad.rope&&!this._padRopePrev){this.placeRope(this.scene.mapData);}
    this._padBombPrev=pad?.bomb||false;
    this._padRopePrev=pad?.rope||false;

    if(left){vx=-spd;this.facingRight=false;}
    else if(right){vx=spd;this.facingRight=true;}

    // Jump
    if(up&&this.onGround){vy=-460;}

    // On ladder/rope
    const tx=Math.floor(this.sprite.x/TS),ty=Math.floor(this.sprite.y/TS);
    const onLadder=map[ty]&&(map[ty][tx]===T.LADDER||map[ty][tx]===T.ROPE||map[ty][tx]===T.ELEV);
    if(onLadder){
      if(keys.up||(pad&&pad.dy<0))vy=-120;
      else if(keys.down||(pad&&pad.dy>0))vy=120;
      else vy=Math.max(0,vy);
      this.sprite.body.allowGravity=false;
    } else {
      this.sprite.body.allowGravity=true;
    }

    this.sprite.setVelocity(vx,vy);
    this.onGround=this.sprite.body.blocked.down;

    // Mining
    if(dig){this._doMine(dt,map,keys,pad);}
    else{this.mineTarget=null;this.mineProgress=0;}

    // Return beacon
    if(ret&&this.inventory.beacon>0){
      this.removeItem('beacon');
      this.sprite.setPosition(Math.floor(MW/2)*TS,8*TS);
    }

    // Oxygen (when in water)
    // ① 水没エリア: 酸素急速消費→HP減少→ダウン
    const inWater=map[ty]&&map[ty][tx]===T.WATER;
    if(inWater){
      this.oxygen=Math.max(0,this.oxygen-dt*12);
      if(this.oxygen<=0){
        this.hp=Math.max(0,this.hp-dt*20);
        if(!this._warnedOx){this._warnedOx=true;this.scene.showMsg(`🌊 P${this.id+1} 水没！酸素切れ！`,0xFF4444);}
      }
    } else if(this.sprite.y/TS<BIOMES[0].y1+2){
      this.oxygen=Math.min(this.maxOxygen,this.oxygen+dt*25);
      this._warnedOx=false;
    } else {
      // ① 酸素切れハザード: 地下で酸素消費、0になるとHP減少
      this.oxygen=Math.max(0,this.oxygen-dt*1.5);
      if(this.oxygen<=0){
        this.hp=Math.max(0,this.hp-dt*8);
        if(!this._warnedOx){this._warnedOx=true;this.scene.showMsg(`😵 P${this.id+1} 酸素切れ！HP減少中！`,0xFF8800);}
      } else { this._warnedOx=false; }
      if(this.oxygen<5&&this.inventory.oxygen>0){this.removeItem('oxygen');this.oxygen=this.maxOxygen;this.scene.showMsg(`🫙 P${this.id+1} 酸素ボンベ使用`,0x87CEEB);}
    }

    // ② バッテリー切れ: 暗闇ペナルティ・ダメージ増加
    this.battery=Math.max(0,this.battery-dt*1);
    if(this.battery<=0){
      this.lightRange=40; // 極狭い視野
      if(!this._warnedBat){this._warnedBat=true;this.scene.showMsg(`🔦 P${this.id+1} バッテリー切れ！暗闇で敵が強くなる！`,0xFF8800);}
      // バッテリー切れ中は敵のダメージ増加 (scene側で制御)
      this._batteryDead=true;
    } else {
      this.lightRange=180+this.upgrades.light*40;
      this._batteryDead=false;
      this._warnedBat=false;
    }
    if(this.battery<5&&this.inventory.battery>0){this.removeItem('battery');this.battery=this.maxBattery;this.scene.showMsg(`🔋 P${this.id+1} 電池交換`,0xFFD700);}

    // ③ マグマダメージ
    if(map[ty]&&map[ty][tx]===T.LAVA){this.hp=Math.max(0,this.hp-dt*30);}
    // ④ 毒ガスエリアダメージ (T.GAS ブロック)
    if(map[ty]&&map[ty][tx]===T.GAS){
      this.hp=Math.max(0,this.hp-dt*5);
      if(!this._warnedGas){this._warnedGas=true;this.scene.showMsg(`☠️ P${this.id+1} 毒ガス！HP減少！`,0x7CFC00);}
    } else { this._warnedGas=false; }

    // ダウン判定
    if(this.hp<=0){this.hp=0;this.downed=true;this.downTimer=15;}

    // Deepest
    const depth=Math.max(0,Math.floor(this.sprite.y/TS)-BIOMES[0].y1);
    if(depth>this.deepest)this.deepest=depth;
    if(depth>GS.deepestReached)GS.deepestReached=depth;

    // Stamina regen
    if(!dig)this.stamina=Math.min(this.maxStamina,this.stamina+dt*12);

    // Name tag follow
    this.nameTag.setPosition(this.sprite.x,this.sprite.y-22);

    // スプライトアニメーション更新
    this._updateAnim(dt, dig, left||right, !this.onGround);

    // 向き反転
    this.sprite.setFlipX(!this.facingRight);
  }

  _updateAnim(dt, digging, moving, inAir){
    if(!this.scene.textures.exists('player_idle')) return;
    this._animTimer+=dt;
    const FPS=8, interval=1/FPS;

    let frames, newState;
    if(this.downed){ newState='down'; frames=this._downFrames; }
    else if(digging&&this.mineTarget){ newState='dig'; frames=this._digFrames; }
    else if(inAir){ newState='jump'; frames=this._jumpFrames; }
    else if(moving){ newState='walk'; frames=this._walkFrames; }
    else { newState='idle'; frames=['player_idle']; }

    if(newState!==this._animState){ this._animState=newState; this._animFrame=0; this._animTimer=0; }
    if(this._animTimer>=interval){
      this._animTimer=0;
      this._animFrame=(this._animFrame+1)%frames.length;
    }
    const key=frames[this._animFrame];
    if(this.scene.textures.exists(key)) this.sprite.setTexture(key);
  }

  _updateDowned(dt,map){
    this.downTimer-=dt;
    this.sprite.setTint(0xFF0000);
    if(this.downTimer<=0){
      // 失敗時: アイテムの50%ランダムロスト + ゴールド30%減
      this.hp=30; this.downed=false;
      this.sprite.clearTint();
      this.sprite.setPosition(Math.floor(MW/2)*TS,8*TS);
      // アイテムロスト (ランダムに半分消える)
      const keys=Object.keys(this.inventory);
      let lostCount=0;
      for(const k of keys){
        if(Math.random()<0.5&&this.inventory[k]>0){
          const lose=Math.ceil(this.inventory[k]/2);
          this.inventory[k]=Math.max(0,this.inventory[k]-lose);
          if(this.inventory[k]===0)delete this.inventory[k];
          this.weight=Math.max(0,this.weight-(ITEMS[k]?.w||0)*lose);
          lostCount++;
        }
      }
      GS.gold=Math.floor(GS.gold*0.7);
      const pName=this.id===0?'P1':'P2';
      this.scene.showMsg(`💀 ${pName} 力尽きた！ゴールド-30% アイテム半減！`,0xFF4444);
    }
  }

  _doMine(dt,map,keys,pad){
    // Find target tile
    const px=this.sprite.x, py=this.sprite.y;
    const facX=this.facingRight?1:-1;
    // Check down preference then facing
    const candidates=[
      {x:Math.floor(px/TS)+facX, y:Math.floor(py/TS)},
      {x:Math.floor(px/TS)+facX, y:Math.floor(py/TS)+1},
      {x:Math.floor(px/TS),      y:Math.floor(py/TS)+1},
      {x:Math.floor(px/TS)+facX, y:Math.floor(py/TS)-1},
    ];

    // Use keyboard direction to pick target
    if(keys.down||(pad&&pad.dy>0)){
      candidates.unshift({x:Math.floor(px/TS),y:Math.floor(py/TS)+1});
    }
    if(keys.up||(pad&&pad.dy<0)){
      candidates.unshift({x:Math.floor(px/TS),y:Math.floor(py/TS)-1});
    }

    let tgt=null;
    for(const c of candidates){
      const b=map[c.y]?.[c.x];
      if(b!==undefined&&b!==T.AIR&&b!==T.BEDROCK&&b!==T.WATER&&b!==T.LAVA&&b!==T.GAS&&b!==T.DOOR_C&&b!==T.ELEV){
        if(b===T.DOOR_C)continue;
        tgt=c; break;
      }
    }

    if(!tgt){this.mineTarget=null;this.mineProgress=0;return;}
    if(!this.mineTarget||this.mineTarget.x!==tgt.x||this.mineTarget.y!==tgt.y){
      this.mineTarget=tgt; this.mineProgress=0;
    }

    if(this.stamina<1)return;
    const bl=map[tgt.y][tgt.x];
    const def=BD[bl];
    if(!def||def.h===0)return;

    const power=this.mineSpeed*(1+this.upgrades.pickaxe*0.25);
    this.mineProgress+=dt*power;
    this.stamina=Math.max(0,this.stamina-dt*8);

    if(this.mineProgress>=def.h){
      // Break block
      map[tgt.y][tgt.x]=T.AIR;
      this.scene.onBlockBroken(tgt.x,tgt.y,bl,this);
      this.mineTarget=null; this.mineProgress=0;
      // Check for co-op switch
      if(bl===T.SW_OFF){
        map[tgt.y][tgt.x]=T.SW_ON;
        this.scene.activateSwitch(tgt.x,tgt.y);
      }
    }
  }

  useBomb(map){
    if(!this.inventory.bomb||this.inventory.bomb<=0)return;
    this.removeItem('bomb');
    const px=Math.floor(this.sprite.x/TS)+(this.facingRight?2:-2);
    const py=Math.floor(this.sprite.y/TS);
    const r=2+this.upgrades.bomb;
    for(let dy=-r;dy<=r;dy++){
      for(let dx=-r;dx<=r;dx++){
        if(Math.hypot(dx,dy)<=r){
          const bx=px+dx,by=py+dy;
          const b=map[by]?.[bx];
          if(b!==undefined&&b!==T.BEDROCK&&b!==T.AIR){
            const def=BD[b]; if(def&&def.drop){this.addItem(def.drop,1);}
            map[by][bx]=T.AIR;
            if(this.scene.layer)this.scene.layer.putTileAt(T.AIR,bx,by);
          }
        }
      }
    }
    this.scene.cameras.main.shake(300,0.01);
    this.scene.showMsg('💥 爆発！',0xFF8800);
  }

  placeRope(map){
    if(!this.inventory.rope||this.inventory.rope<=0)return;
    const tx=Math.floor(this.sprite.x/TS);
    const ty=Math.floor(this.sprite.y/TS)-1;
    if(map[ty]&&map[ty][tx]===T.AIR){
      map[ty][tx]=T.ROPE;
      if(this.scene.layer)this.scene.layer.putTileAt(T.ROPE,tx,ty);
      this.removeItem('rope');
      this.scene.showMsg('🪢 ロープ設置',0xDEB887);
    }
  }

  heal(){
    if(!this.inventory.heal||this.inventory.heal<=0)return;
    this.removeItem('heal');
    this.hp=Math.min(this.maxHp,this.hp+50);
    this.scene.showMsg((this.id===0?'P1':'P2')+' 回復！',0x44FF44);
  }

  rescue(other){
    if(!other.downed)return;
    const dist=Math.hypot(this.sprite.x-other.sprite.x,this.sprite.y-other.sprite.y);
    if(dist<60){
      other.hp=40; other.downed=false; other.sprite.clearTint();
      this.scene.showMsg('🤝 救助成功！',0x44FF44);
    }
  }

  applyUpgrade(type){
    const cost=this._upgCost(type);
    if(GS.gold<cost)return false;
    GS.gold-=cost;
    this.upgrades[type]++;
    switch(type){
      case 'hp':    this.maxHp    =100+this.upgrades.hp*20;   this.hp=this.maxHp;break;
      case 'stamina':this.maxStamina=100+this.upgrades.stamina*20;break;
      case 'weight':this.maxWeight =30 +this.upgrades.weight*10;  break;
      case 'speed': this.moveSpeed =160+this.upgrades.speed*20;   break;
      case 'light': this.lightRange=180+this.upgrades.light*40;   break;
      case 'pickaxe':this.mineSpeed=1  +this.upgrades.pickaxe*0.25;break;
    }
    return true;
  }

  _upgCost(type){
    const base={hp:30,stamina:25,weight:20,speed:40,light:35,pickaxe:50,drill:80,bomb:30,range:45};
    return Math.floor((base[type]||30)*Math.pow(1.8,this.upgrades[type]||0));
  }
}

// ================================================================
// ENEMY CLASS
// ================================================================
class Enemy{
  constructor(scene,x,y,type){
    this.scene=scene; this.type=type;
    const cfg=ENEMY_CFG[type]||ENEMY_CFG.worm;
    this.hp=cfg.hp; this.maxHp=cfg.hp;
    this.dmg=cfg.dmg; this.speed=cfg.speed;
    this.state='patrol'; this.stateTimer=0;
    this.dir=1; this.onGround=false;
    this.dead=false;

    // 敵スプライト (画像優先、なければフォールバック)
    const eKey='enemy_'+type;
    if(scene.textures.exists(eKey)){
      this.sprite=scene.physics.add.sprite(x,y,eKey);
      const scale={worm:.18,bat:.18,slime:.16,golem:.22,plant:.2,mushroom:.18,arobot:.2,giant_worm:.25,boss:.28}[type]||.18;
      this.sprite.setScale(scale);
    } else {
      const g=scene.add.graphics();
      g.fillStyle(cfg.col); g.fillCircle(12,12,12);
      g.generateTexture('e_'+type,24,24); g.destroy();
      this.sprite=scene.physics.add.sprite(x,y,'e_'+type);
    }
    this.sprite.setDepth(8);
    this.sprite.body.setSize(22,22);
  }

  update(dt,players,map){
    if(this.dead)return;
    this.stateTimer-=dt;

    // Find nearest player
    let nearest=null, nearDist=9999;
    for(const p of players){
      if(p.downed)continue;
      const d=Math.hypot(p.sprite.x-this.sprite.x,p.sprite.y-this.sprite.y);
      if(d<nearDist){nearDist=d;nearest=p;}
    }

    if(nearDist<200&&nearest){
      this.state='chase';
      const dx=nearest.sprite.x-this.sprite.x;
      this.sprite.setVelocityX(Math.sign(dx)*this.speed);
      if(nearDist<30){
        // attack
        if(this.stateTimer<=0){
          nearest.hp=Math.max(0,nearest.hp-this.dmg);
          this.stateTimer=1;
          if(nearest.hp<=0)nearest.downed=true;
        }
      }
    } else {
      this.state='patrol';
      if(this.stateTimer<=0){this.dir*=-1;this.stateTimer=2+Math.random()*2;}
      this.sprite.setVelocityX(this.dir*this.speed*0.5);
    }

    this.onGround=this.sprite.body.blocked.down;
    if(this.onGround&&this.state==='patrol'&&Math.random()<0.01){
      this.sprite.setVelocityY(-200);
    }
  }

  takeDamage(dmg){
    this.hp-=dmg;
    if(this.hp<=0){this.dead=true;this.sprite.destroy();}
  }
}

  worm:   {hp:20,  dmg:8,  speed:60,  col:0x8B4513, drop:'stone'},
  bat:    {hp:15,  dmg:6,  speed:100, col:0x333333, drop:null},
  slime:  {hp:30,  dmg:10, speed:50,  col:0x44BB44, drop:'crystal'},

};

// ================================================================
// QUEST SYSTEM
// ================================================================
const QUEST_POOL=[
  {id:'earn500',  text:'500G稼ぐ',           check:(gs,ps)=>gs.totalEarned-gs._qStart.earn>=500,   reward:100},
  {id:'earn2000', text:'2000G稼ぐ',          check:(gs,ps)=>gs.totalEarned-gs._qStart.earn>=2000,  reward:500},
  {id:'copper5',  text:'銅を5個集める',       check:(gs,ps)=>ps.some(p=>(p.inventory.copper||0)>=5),reward:60},
  {id:'iron3',    text:'鉄を3個集める',       check:(gs,ps)=>ps.some(p=>(p.inventory.iron||0)>=3), reward:150},
  {id:'gold1',    text:'金を1個持ち帰る',     check:(gs,ps)=>ps.some(p=>(p.inventory.gold||0)>=1), reward:200},
  {id:'gem1',     text:'宝石を発見する',      check:(gs,ps)=>ps.some(p=>(p.inventory.gem||0)>=1),  reward:500},
  {id:'depth50',  text:'深さ50mに到達',       check:(gs,ps)=>gs.deepestReached>=50,                reward:150},
  {id:'depth120', text:'深さ120mに到達',      check:(gs,ps)=>gs.deepestReached>=120,               reward:400},
  {id:'rescue',   text:'仲間を救助する',      check:(gs,ps)=>gs._rescueDone||false,                reward:200},
  {id:'fossil2',  text:'化石を2つ集める',     check:(gs,ps)=>ps.some(p=>(p.inventory.fossil||0)>=2),reward:300},
  {id:'ancient1', text:'古代品を発見',        check:(gs,ps)=>ps.some(p=>(p.inventory.ancient||0)>=1),reward:800},
];

function pickQuests(n=3){
  const pool=[...QUEST_POOL];
  const out=[];
  for(let i=0;i<n&&pool.length;i++){
    const idx=Math.floor(Math.random()*pool.length);
    out.push({...pool[idx],done:false});
    pool.splice(idx,1);
  }
  return out;
}

// ================================================================
class BootScene extends Phaser.Scene{
  constructor(){super('Boot');}
  preload(){
    // 全アセット読み込み（404は黙って無視）
    this.load.on('loaderror', ()=>{});
    for(const[k,v]of Object.entries(ASSETS)){
      this.load.image(k, v);
    }
  }
  create(){
    this._makeTiles();
    this.scene.start('Title');
  }
  _makeTiles(){
    const c=document.createElement('canvas');
    c.width=TS*NUM_T; c.height=TS;
    const ctx=c.getContext('2d');
    for(let i=0;i<NUM_T;i++){
      const def=BD[i];
      if(!def){ctx.clearRect(i*TS,0,TS,TS);continue;}
      const alpha=def.a!==undefined?def.a:1;
      ctx.globalAlpha=alpha;
      ctx.fillStyle=def.col||'#000';
      ctx.fillRect(i*TS,0,TS,TS);
      ctx.globalAlpha=1;

      // Details
      if(def.col&&alpha>0){
        // border
        ctx.strokeStyle='rgba(0,0,0,0.3)';
        ctx.lineWidth=1;
        ctx.strokeRect(i*TS+.5,0+.5,TS-1,TS-1);
        // Ore sparkle
        if([T.COPPER,T.IRON,T.GOLD,T.GEM,T.FOSSIL,T.ANCIENT,T.MACHINE,T.UNK_ORE,T.CRYSTAL,T.DEEPCRYSTAL,T.MAGMASTONE].includes(i)){
          ctx.fillStyle='rgba(255,255,255,0.6)';
          ctx.beginPath();ctx.arc(i*TS+8,8,3,0,Math.PI*2);ctx.fill();
          ctx.beginPath();ctx.arc(i*TS+22,20,2,0,Math.PI*2);ctx.fill();
        }
        // Grass blades
        if(i===T.GRASS){
          ctx.strokeStyle='#2a5c1f'; ctx.lineWidth=2;
          for(let g=0;g<5;g++){
            const gx=i*TS+4+g*6;
            ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx-2,-6);ctx.stroke();
          }
        }
        // Water wave
        if(i===T.WATER){
          ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1.5;
          ctx.beginPath();
          for(let wx=0;wx<TS;wx+=8){ctx.moveTo(i*TS+wx,TS/2);ctx.lineTo(i*TS+wx+4,TS/2-4);}
          ctx.stroke();
        }
        // Lava glow
        if(i===T.LAVA){
          ctx.fillStyle='rgba(255,200,0,0.5)';
          ctx.fillRect(i*TS+4,4,TS-8,12);
        }
      }
    }
    this.textures.addCanvas('tiles',c);
  }
}

    const btn3=this.add.text(W/2,H*0.84,'🌐 オンライン招待リンクを作る',onlineStyle).setOrigin(.5).setInteractive();
    btn3.on('pointerover',()=>btn3.setStyle({...onlineStyle,backgroundColor:'#1A8855'}));
    btn3.on('pointerout', ()=>btn3.setStyle(onlineStyle));
    btn3.on('pointerdown',()=>{
      const roomId=Math.random().toString(36).substring(2,8).toUpperCase();
      const url=location.href.split('?')[0]+'?room='+roomId+'&host=1';
      navigator.clipboard?.writeText(url).then(()=>{

      }).catch(()=>this._showLinkMsg('📋 このURLを友達に送ろう',url,roomId));

    const urlRoom=new URLSearchParams(location.search).get('room');
    if(urlRoom){

      this.time.delayedCall(500,()=>this._startOnline(urlRoom,isHost));

    this.input.keyboard.once('keydown-SPACE', ()=>this._start(2));

  _showLinkMsg(msg,url,roomId){
    const W=this.scale.width,H=this.scale.height;
    const panel=this.add.container(W/2,H/2).setDepth(100);
    const bg=this.add.graphics();
    bg.fillStyle(0x111122,.97);bg.fillRoundedRect(-280,-80,560,160,12);
    bg.lineStyle(2,0x22AA66,1);bg.strokeRoundedRect(-280,-80,560,160,12);
    panel.add(bg);
    panel.add(this.add.text(0,-50,msg,{fontSize:'14px',color:'#44FF88',fontFamily:'monospace'}).setOrigin(.5));
    panel.add(this.add.text(0,-20,'Room: '+roomId,{fontSize:'20px',color:'#FFD700',fontFamily:'monospace'}).setOrigin(.5));
    panel.add(this.add.text(0,10,url.length>50?url.substring(0,50)+'...':url,{fontSize:'10px',color:'#AAA',fontFamily:'monospace'}).setOrigin(.5));
    const startBtn=this.add.text(0,50,'▶ このルームでホストとして開始',{fontSize:'14px',color:'#000',backgroundColor:'#FFD700',padding:{x:12,y:6},fontFamily:'monospace'}).setOrigin(.5).setInteractive();
    startBtn.on('pointerdown',()=>this._startOnline(roomId,true));
    panel.add(startBtn);
  }

  _startOnline(roomId,isHost){
    GS.onlineRoom=roomId; GS.isHost=isHost; GS.isOnline=true;
    this.scene.start('World',{numPlayers:1,roomId,isHost});
  }

  _start(numPlayers){
    GS.isOnline=false;
    this.scene.start('World',{numPlayers});
  }
}

      down: this.input.keyboard.addKey('S'),
      dig:  this.input.keyboard.addKey('F'),
      ret:  this.input.keyboard.addKey('R'),
      bomb: this.input.keyboard.addKey('G'),
      rope: this.input.keyboard.addKey('H'),
      heal: this.input.keyboard.addKey('J'),
      inv:  this.input.keyboard.addKey('I'),
      menu: this.input.keyboard.addKey('TAB'),
    };
    this.keys2={
      left: this.input.keyboard.addKey('LEFT'),
      right:this.input.keyboard.addKey('RIGHT'),
      up:   this.input.keyboard.addKey('UP'),
      down: this.input.keyboard.addKey('DOWN'),
      dig:  this.input.keyboard.addKey('ENTER'),
      ret:  this.input.keyboard.addKey('BACKSPACE'),
      bomb: this.input.keyboard.addKey('SHIFT'),
      rope: this.input.keyboard.addKey('CTRL'),
      heal: this.input.keyboard.addKey('ALT'),
    };

    // E key for interaction
    this.input.keyboard.on('keydown-E',()=>this._interact(0));
    this.input.keyboard.on('keydown-NUMPAD_ENTER',()=>this._interact(1));

    // G/Shift = bomb
    this.input.keyboard.on('keydown-G',()=>{if(this.players[0])this.players[0].useBomb(this.mapData);});
    this.input.keyboard.on('keydown-SHIFT',()=>{if(this.players[1])this.players[1].useBomb(this.mapData);});
    // H = rope
    this.input.keyboard.on('keydown-H',()=>{if(this.players[0])this.players[0].placeRope(this.mapData);});
    this.input.keyboard.on('keydown-CTRL',()=>{if(this.players[1])this.players[1].placeRope(this.mapData);});
    // J = heal
    this.input.keyboard.on('keydown-J',()=>{if(this.players[0])this.players[0].heal();});
    this.input.keyboard.on('keydown-ALT',()=>{if(this.players[1])this.players[1].heal();});
    // I = inventory
    this.input.keyboard.on('keydown-I',()=>this._toggleMenu('inventory',0));
    // ESC = close menu
    this.input.keyboard.on('keydown-ESC',()=>this._closeMenu());
    // TAB = toggle menu
    this.input.keyboard.on('keydown-TAB',()=>this._toggleMenu('inventory',0));

    // バーチャルパッドは supplies の後で初期化

    // Camera
    this.cameras.main.setBounds(0,0,MW*TS,MH*TS);
    this.cameras.main.startFollow(this.players[0].sprite,true,0.08,0.08);
    // 画面サイズに応じたズーム: 最低20タイル分表示
    const zoom = Math.max(1.0, Math.min(2.5, this.W / (20 * TS)));
    this.cameras.main.setZoom(zoom);
    // リサイズ時にズームを更新
    this.scale.on('resize', (gs) => {
      this.W = gs.width; this.H = gs.height;
      const nz = Math.max(1.0, Math.min(2.5, gs.width / (20 * TS)));
      this.cameras.main.setZoom(nz);
    });

    // UI overlay
    this.scene.launch('UI',{world:this});

    // Lighting overlay
    this._lightCanvas=this.textures.createCanvas('light',this.W,this.H);
    this.lightOverlay=this.add.image(0,0,'light').setOrigin(0,0).setScrollFactor(0).setDepth(50).setAlpha(0.95);

    // Message queue
    this.msgGroup=this.add.group();

    // Day timer event
    this.time.addEvent({delay:1000,repeat:this.dayTimeLeft,callback:()=>{
      this.dayTimeLeft--;
      if(this.dayTimeLeft<=0)this._endDay();
      if(this.dayTimeLeft===90){
        this.nightMode=true;
        this.showMsg('🌙 夜になった！地下が危険になる！',0xFF8800);
        // 敵を全員強化
        for(const e of this.enemies){if(!e.dead){e.dmg=Math.ceil(e.dmg*1.5);e.speed=Math.ceil(e.speed*1.3);}}
      }
      if(this.dayTimeLeft===60)this.showMsg('⏰ あと1分！',0xFFAA00);
      if(this.dayTimeLeft===30)this.showMsg('⚠️ 急いで戻れ！',0xFF4400);
      // 地震 (毎60秒)
      if(this.dayTimeLeft%60===0&&this.dayTimeLeft<270){this._triggerEarthquake();}
      // 自動採掘機 (30秒毎)
      if(this.dayTimeLeft%30===0&&GS.baseLevel.autoMine>0){this._autoMine();}
      // 自動売却機 (60秒毎)
      if(this.dayTimeLeft%60===0&&GS.baseLevel.autoSell>0){this._autoSell();}
    }});

    // 落石イベント (5秒毎)
    this.time.addEvent({delay:5000,loop:true,callback:()=>this._spawnFallingRock()});

    // ボス出現チェック (最深部バイオームに入ると出現)
    this.time.addEvent({delay:3000,loop:true,callback:()=>this._checkBossSpawn()});

    // Start with supplies
    for(const p of this.players){
      p.addItem('rope',3); p.addItem('heal',2); p.addItem('battery',2); p.addItem('bomb',1);
    }

    // モバイル: P1・P2それぞれバーチャルパッド (半透明・大きめボタン)
    this.pads=[];
    if(this.sys.game.device.input.touch){
      const W=this.W, H=this.H;
      if(this.numPlayers===1){
        // 1人: 画面下部中央配置 (D-pad左、ボタン右)
        this.pads.push(new VirtualPad(this, W*0.15, H*0.82, 0));
      } else {
        // 2人: 左半分P1、右半分P2
        this.pads.push(new VirtualPad(this, W*0.11, H*0.82, 0));
        this.pads.push(new VirtualPad(this, W*0.61, H*0.82, 1));
      }
    }

    // 役割選択: P1=採掘特化, P2=戦闘特化 (Qキーで切り替え)
    this._applyRoles();
    this.input.keyboard.on('keydown-Q',()=>{
      if(this.players[0])this._cycleRole(this.players[0]);
    });
    this.input.keyboard.on('keydown-NUMPAD_0',()=>{
      if(this.players[1])this._cycleRole(this.players[1]);
    });

    // オンラインマルチプレイヤー初期化
    if(GS.isOnline&&this.roomId){
      this._initOnline();
    }

    this.showMsg(`Day ${GS.day} 開始！掘って稼ごう！`,0x44FF44);
    if(GS.isOnline)this.showMsg('🌐 オンライン接続中... Room: '+this.roomId,0x44FF88);
  }

  _placeBuildingSprites(){
    // 地上タイルY座標 (SURFACE_Y-1行目 = 草の1タイル上に建物を置く)
    const sy = (BIOMES[0].y1 - 1) * TS; // 草レベルのY pixel

    // 建物定義: {key, tileX, displayW}
    const bldgs=[
      {key:'bldg_house',    tx:4,  label:'家'},
      {key:'bldg_sell',     tx:12, label:'売却所'},
      {key:'bldg_upgrade',  tx:20, label:'強化'},
      {key:'bldg_warehouse',tx:28, label:'倉庫'},
      {key:'bldg_craft',    tx:37, label:'クラフト'},
      {key:'bldg_quest',    tx:45, label:'クエスト'},
      {key:'bldg_generator',tx:53, label:'発電機'},
      {key:'bldg_oxygen',   tx:59, label:'酸素'},
      {key:'bldg_elevator', tx:Math.floor(MW/2)-1, label:'EV'},
    ];

    for(const b of bldgs){
      const wx = b.tx * TS;
      if(this.textures.exists(b.key)){
        const img=this.add.image(wx, sy, b.key)
          .setOrigin(0, 1).setDepth(2);
        // 建物の高さを3タイル分にスケール
        const targetH = TS * 4;
        const frame=this.textures.getFrame(b.key);
        if(frame) img.setScale(targetH / frame.realHeight);
      }
    }
  }

  // ⑧ 倉庫前にトロフィーを実際のゲーム世界に配置表示
  _updateTrophyDisplay(){
    if(!this._trophyContainer)return;
    this._trophyContainer.removeAll(true);
    if(!GS.trophies||GS.trophies.length===0)return;
    const sy=(BIOMES[0].y1-1)*TS;
    const warehouseX=29*TS;
    const counts={};
    for(const t of GS.trophies)counts[t]=(counts[t]||0)+1;
    let i=0;
    for(const[item,cnt]of Object.entries(counts)){
      if(i>=8)break;
      const x=warehouseX+i*22, y=sy-8;
      const imgKey=item.startsWith('ore_')?item:item+'_item';
      if(this.textures.exists(imgKey)){
        const img=this.add.image(x,y,imgKey).setScale(0.09).setOrigin(.5,1).setDepth(3);
        this._trophyContainer.add(img);
      } else {
        const col=parseInt((ITEMS[item]?.col||'#FFD700').replace('#',''),16);
        this._trophyContainer.add(this.add.circle(x,y,7,col).setDepth(3));
      }
      if(cnt>1)this._trophyContainer.add(
        this.add.text(x,y-12,'×'+cnt,{fontSize:'8px',color:'#FFD700',fontFamily:'monospace'}).setOrigin(.5,1).setDepth(3));
      i++;
    }
    if(GS.machineCompleted){
      this._trophyContainer.add(this.add.text(warehouseX-30,(BIOMES[0].y1-2)*TS,'🤖',{fontSize:'18px'}).setDepth(3));
    }
  }

  _makeBg(){
    // バイオーム背景: 画像あれば使用、なければカラー
    const bgMap={
      '地上':      ['bg_sky','bg_backyard'],
      '浅い土':    ['bg_shallow_underground'],
      '岩盤層':    ['bg_bedrock'],
      '鉱山層':    ['bg_mine'],
      '化石層':    ['bg_fossil'],
      '地下湖':    ['bg_underground_lake'],
      '古代遺跡':  ['bg_ancient_ruins'],
      'マグマ層':  ['bg_magma'],
      '最深部':    ['bg_deepest'],
    };
    const bg=this.add.graphics().setDepth(-2);
    for(const b of BIOMES){
      const col=b.bg||0x111111;
      bg.fillStyle(col,1);
      bg.fillRect(0,b.y0*TS,MW*TS,(b.y1-b.y0)*TS);
      // 背景画像を敷き詰め
      const keys=bgMap[b.name]||[];
      for(const key of keys){
        if(!this.textures.exists(key)) continue;
        const frame=this.textures.getFrame(key);
        const bw=frame.realWidth, bh=frame.realHeight;
        const zoneH=(b.y1-b.y0)*TS;
        // 横方向タイリング、縦は中央にフィット
        const scale=zoneH/bh;
        const sw=Math.max(1, bw*scale);
        for(let x=0;x<=MW*TS;x+=sw){
          this.add.image(x, b.y0*TS, key)
            .setOrigin(0,0).setScale(scale).setDepth(-1);
        }
        break;
      }
    }
  }

  _buildTilemap(){
    // Convert mapData (2D Uint8Array) to flat array for Phaser
    const flatData=[];
    for(let y=0;y<MH;y++)flatData.push(Array.from(this.mapData[y]));

    const map=this.make.tilemap({data:flatData,tileWidth:TS,tileHeight:TS});
    const tileset=map.addTilesetImage('tiles','tiles',TS,TS,0,0);
    this.layer=map.createLayer(0,tileset,0,0);
    this.layer.setDepth(1);

    // Collision layer (only solid tiles)
    this.collisionLayer=this.layer;
    // Set collision for solid tiles
    const solidIds=Object.entries(BD).filter(([,d])=>d.solid).map(([id])=>parseInt(id));
    this.layer.setCollision(solidIds);
  }

  _spawnEnemies(){
    const enemyTable=[
      {biome:'浅い土',type:'worm',count:6},
      {biome:'岩盤層', type:'bat', count:5},
      {biome:'鉱山層', type:'slime',count:4},
      {biome:'化石層', type:'worm',count:5},
      {biome:'地下湖', type:'bat', count:6},
      {biome:'古代遺跡',type:'arobot',count:4},
      {biome:'マグマ層',type:'golem',count:4},
      {biome:'最深部', type:'plant',count:5},
    ];
    for(const et of enemyTable){
      const b=BIOMES.find(x=>x.name===et.biome);if(!b)continue;
      for(let i=0;i<et.count;i++){
        const ex=(3+Math.floor(Math.random()*(MW-6)))*TS;
        const ey=(b.y0+2+Math.floor(Math.random()*(b.y1-b.y0-4)))*TS;
        const e=new Enemy(this,ex,ey,et.type);
        this.physics.add.collider(e.sprite,this.collisionLayer);
        this.enemies.push(e);
      }
    }
  }

  update(time,delta){
    const dt=Math.min(delta/1000,0.05);
    if(this.paused||this.openMenu)return;

    // Update players
    for(let i=0;i<this.players.length;i++){
      const p=this.players[i];
      const keys=i===0?this._keysState(this.keys1):this._keysState(this.keys2);
      const pad=this.pads[i]||null;
      p.update(dt,keys,pad,this.mapData);
    }

    // Co-op proximity bonus
    if(this.players.length===2&&!this.players[0].downed&&!this.players[1].downed){
      const dist=Math.hypot(
        this.players[0].sprite.x-this.players[1].sprite.x,
        this.players[0].sprite.y-this.players[1].sprite.y);
      const bonus=dist<80?1.3:1;
      this.players[0]._coopBonus=bonus; this.players[1]._coopBonus=bonus;
    }

    // Rescue check
    if(this.players.length===2){
      if(this.players[0].downed&&!this.players[1].downed)this.players[1].rescue(this.players[0]);
      if(this.players[1].downed&&!this.players[0].downed)this.players[0].rescue(this.players[1]);
    }

    // Update enemies
    for(const e of this.enemies){
      e.update(dt,this.players,this.mapData);
    }

    // Camera follow: center of active players
    const active=this.players.filter(p=>!p.downed);
    if(active.length===2){
      const cx=(active[0].sprite.x+active[1].sprite.x)/2;
      const cy=(active[0].sprite.y+active[1].sprite.y)/2;
      this.cameras.main.centerOn(cx,cy);
    }

    // Lighting
    this._updateLighting();

    // Quest check
    this._checkQuests();

    // Check interaction proximity (surface buildings)
    this._checkBuildingProximity();

    // 置き去りペナルティチェック
    this._checkLeavingPartner();

    // 重いアイテムチェック
    this._checkHeavyItemCarry();

    // オンライン同期 (50ms = 20Hz)
    if(GS.isOnline){
      this._syncTimer+=dt;
      if(this._syncTimer>=0.05){this._syncTimer=0;this._broadcastState();}
    }

    // 落石更新
    this._updateFallingRocks(dt);

    // 近接採掘ボーナス (2人が80px以内)
    if(this.players.length===2){
      const d=Math.hypot(
        this.players[0].sprite.x-this.players[1].sprite.x,
        this.players[0].sprite.y-this.players[1].sprite.y);
      const bonus=d<80?1.5:1.0;
      this.players[0].mineSpeed=this.players[0]._baseMineSpeed*(bonus*(1+this.players[0].upgrades.pickaxe*0.25));
      this.players[1].mineSpeed=this.players[1]._baseMineSpeed*(bonus*(1+this.players[1].upgrades.pickaxe*0.25));
      if(d<80&&Math.random()<0.005)this.showMsg('⚒️ 協力ボーナス！採掘速度x1.5',0xFFCC44);
    }
  }

  _keysState(kb){
    return{
      left:kb.left.isDown, right:kb.right.isDown,
      up:kb.up.isDown, down:kb.down&&kb.down.isDown,
      dig:kb.dig.isDown, ret:kb.ret&&kb.ret.isDown,
    };
  }

  _updateLighting(){
    const ctx=this._lightCanvas.context;
    const W=this.W, H=this.H;
    ctx.clearRect(0,0,W,H);

    // Determine darkness based on camera Y position
    const camTileY=Math.floor(this.cameras.main.scrollY/TS);
    const biome=getBiome(camTileY);
    const dark=biome.darkFactor||0;
    if(dark<0.05){this.lightOverlay.setAlpha(0);return;}

    ctx.fillStyle=`rgba(0,0,0,${dark})`;
    ctx.fillRect(0,0,W,H);

    // Player light sources
    ctx.globalCompositeOperation='destination-out';
    for(const p of this.players){
      if(p.downed)continue;
      const sx=p.sprite.x-this.cameras.main.scrollX;
      const sy=p.sprite.y-this.cameras.main.scrollY;
      const r=p.lightRange*(this.cameras.main.zoom);
      const grad=ctx.createRadialGradient(sx,sy,0,sx,sy,r);
      grad.addColorStop(0,'rgba(0,0,0,1)');
      grad.addColorStop(0.4,'rgba(0,0,0,0.7)');
      grad.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=grad;
      ctx.beginPath(); ctx.arc(sx,sy,r,0,Math.PI*2); ctx.fill();
    }
    // Lava light
    ctx.globalCompositeOperation='destination-out';

    ctx.globalCompositeOperation='source-over';
    this._lightCanvas.refresh();
    this.lightOverlay.setAlpha(0.92);
  }

  onBlockBroken(tx,ty,blockType,player){
    if(this.layer)this.layer.putTileAt(T.AIR,tx,ty);
    // オンライン同期
    if(GS.isOnline)this._broadcastMine(tx,ty);

    // Drop item
    const def=BD[blockType];
    if(def&&def.drop){
      if(def.drop==='chest'){
        this._openChest(tx,ty,player);
      } else {
        player.addItem(def.drop,1);

        // ⑤ 機械部品カウント → 5個で謎の機械完成
        if(def.drop==='machine'){
          GS.mechParts++;
          this.showMsg(`⚙️ 機械部品 ${GS.mechParts}/5 取得！`,0x2ECC71);
          if(GS.mechParts>=5&&!GS.machineCompleted){
            GS.machineCompleted=true;
            this.time.delayedCall(500,()=>{
              this.cameras.main.flash(1200,0,200,255,false);
              this.showMsg('🤖 謎の機械が完成した！「これは古代の自動採掘機だ！」',0x2ECC71);
              this.time.delayedCall(2000,()=>this.showMsg('📖 地下の正体が解明された！+3000G',0xFFD700));
              GS.gold+=3000; GS.totalEarned+=3000;
            });
          }
        }

        // ⑥ 巨大鉱石持ち帰り (deepcrystal/ore_giant は超重いが高価値)
        if(def.drop==='deepcrystal'){
          this.showMsg('💎 巨大鉱石発見！地上に持ち帰ると高額で売れる！',0x8800FF);
          this.cameras.main.flash(400,136,0,255,false);
        }

        // レア発見演出
        if(ITEMS[def.drop]&&ITEMS[def.drop].rare){
          this.showMsg(`✨ レアアイテム発見: ${ITEMS[def.drop].name}!`,0xFFD700);
          this.cameras.main.flash(300,255,215,0,false);
        }
      }
    }
  }

  _openChest(tx,ty,player){
    const lootTable=[
      {item:'gold',  qty:1,  w:4},
      {item:'gem',   qty:1,  w:2},
      {item:'bomb',  qty:2,  w:3},
      {item:'heal',  qty:2,  w:3},
      {item:'rope',  qty:3,  w:3},
      {item:'map_piece',qty:1,w:1},
      {item:'dkey',  qty:1,  w:1},
      {item:'ancient',qty:1, w:2},
    ];
    let r=Math.random()*lootTable.reduce((s,l)=>s+l.w,0);
    for(const l of lootTable){
      r-=l.w; if(r<=0){
        player.addItem(l.item,l.qty);
        this.showMsg(`📦 宝箱: ${ITEMS[l.item]?.name||l.item} x${l.qty}!`,0xDAA520);
        if(l.item==='map_piece'){GS.mapPieces++;this.showMsg('🗺️ 地図の欠片を発見！',0xFFFF00);}
        break;
      }
    }
    this.cameras.main.shake(200,0.005);
  }

  activateSwitch(sx,sy){
    // Find associated doors and open them
    this.mapData[sy][sx]=T.SW_ON;
    this.layer.putTileAt(T.SW_ON,sx,sy);
    // Open doors in vicinity
    for(let dy=-20;dy<=20;dy++){
      for(let dx=-20;dx<=20;dx++){
        const bt=this.mapData[sy+dy]?.[sx+dx];
        if(bt===T.DOOR_C){
          this.mapData[sy+dy][sx+dx]=T.DOOR_O;
          this.layer.putTileAt(T.DOOR_O,sx+dx,sy+dy);
          // Update collision
          this.layer.setCollision([T.DOOR_C],true);
          this.layer.setCollision([T.DOOR_O],false);
        }
      }
    }
    this.showMsg('🔓 扉が開いた！',0x44FF44);
    this.cameras.main.flash(200,0,255,0,false);
  }

  // ================================================================
  // 役割選択・重いアイテム・アイテムロスト・倉庫トロフィー
  // ================================================================

  _applyRoles(){
    for(const p of this.players){
      if(!p.role) p.role = p.id===0 ? 'miner' : 'fighter';
      this._applyRoleStats(p);
    }
  }

  _applyRoleStats(p){
    if(p.role==='miner'){
      p._baseMineSpeed=1.6;  // +60% 採掘速度
      p.moveSpeed=140;        // -12% 移動速度
      p.lightRange=200;       // ライト広め
    } else if(p.role==='fighter'){
      p._baseMineSpeed=0.8;   // -20% 採掘速度
      p.moveSpeed=190;        // +20% 移動速度
      p.maxHp=140;p.hp=Math.min(p.hp,140); // +40% HP
    } else {
      p._baseMineSpeed=1.0;
      p.moveSpeed=160;
      p.maxHp=100;
    }
    p.mineSpeed=p._baseMineSpeed;
  }

  _cycleRole(p){
    const roles=['miner','fighter','normal'];
    const names={'miner':'⛏ 採掘特化','fighter':'⚔️ 戦闘特化','normal':'⚡ バランス'};
    const idx=(roles.indexOf(p.role)+1)%roles.length;
    p.role=roles[idx];
    this._applyRoleStats(p);
    this.showMsg(`P${p.id+1} 役割: ${names[p.role]}`,0xFFD700);
  }

  _checkHeavyItemCarry(){
    // ore_giantは2人が近くにいれば持てる
    for(const p of this.players){
      if(p.downed)continue;
      const tx=Math.floor(p.sprite.x/TS), ty=Math.floor(p.sprite.y/TS);
      // 周辺タイルに ore_giant (drop=deepcrystal の超重いもの相当) があるか
      for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
        const b=this.mapData[ty+dy]?.[tx+dx];
        if(!b)continue;
        // 巨大鉱石は hardness>=24 でdrop='deepcrystal'のブロック
        if(BD[b]?.h>=24&&BD[b]?.drop){
          const other=this.players.find(op=>op!==p&&!op.downed);
          if(other){
            const dist=Math.hypot(p.sprite.x-other.sprite.x,p.sprite.y-other.sprite.y);
            if(dist<100){
              // 2人で運べる！通常の採掘より速く
              this.showMsg('⚒️ 2人で協力して掘れる！',0xFFD700);
            } else {
              if(Math.random()<0.002)
                this.showMsg('👥 仲間が近くにいれば一緒に掘れる！',0xFF8800);
            }
          }
        }
      }
    }
  }

  // ================================================================
  // オンラインマルチプレイヤー (Supabase Realtime Broadcast)
  // ================================================================
  // PeerJS P2Pオンライン接続 (サーバー不要・無料)
  // ================================================================
  _initOnline(){
    if(typeof Peer==='undefined'){
      this.showMsg('⚠️ PeerJS読み込み待ち...再接続中',0xFFAA00);
      this.time.delayedCall(2000,()=>this._initOnline());
      return;
    }
    const roomId=this.roomId;
    const isHost=this.isHost;

    try{
      // ホスト: peerId = 'hori-' + roomId
      // ゲスト: peerId = 'hori-' + roomId + '-' + random
      const myPeerId = isHost ? 'hori-'+roomId : 'hori-'+roomId+'-g'+Date.now().toString(36);
      const peer=new Peer(myPeerId,{
        host:'0.peerjs.com', port:443, path:'/',
        secure:true, debug:0,
        config:{iceServers:[{urls:'stun:stun.l.google.com:19302'}]},
      });
      this._peer=peer;

      peer.on('open',(id)=>{
        this._myPeerId=id;
        if(isHost){
          this.showMsg('✅ ルーム作成！招待リンクを友達に送ろう',0x44FF44);
          this.showMsg('👥 友達の接続を待っています...',0x44CCFF);
          // ゲストからの接続を待つ
          peer.on('connection',(conn)=>{
            this._setupPeerConn(conn);
            this.showMsg('🎮 友達が参加しました！',0x44FF44);
          });
        } else {
          // ゲスト: ホストに接続
          this.showMsg('🔗 ホストに接続中...',0x44CCFF);
          const conn=peer.connect('hori-'+roomId,{reliable:false,serialization:'json'});
          this._setupPeerConn(conn);
          conn.on('open',()=>{
            this.showMsg('✅ 接続成功！一緒に掘ろう！',0x44FF44);
            // ゲストはホストのマップを要求
            conn.send({type:'request_map',playerId:this._myId});
          });
          conn.on('error',(e)=>this.showMsg('❌ 接続失敗: '+e.type,0xFF4444));
        }
      });

      peer.on('error',(e)=>{
        if(e.type==='peer-unavailable'&&!isHost){
          this.showMsg('❌ ルームが見つかりません: '+roomId,0xFF4444);
        } else {
          this.showMsg('⚠️ 接続エラー: '+e.type,0xFF8800);
        }
      });
      peer.on('disconnected',()=>{
        this.showMsg('🔌 切断されました',0xFF8800);
        peer.reconnect();
      });
    }catch(e){
      this.showMsg('❌ P2P初期化失敗: '+e.message,0xFF4444);
    }
  }

  _setupPeerConn(conn){
    this._peerConn=conn;
    conn.on('data',(data)=>{
      if(!data)return;
      if(data.type==='state')  this._onRemoteState(data);
      if(data.type==='mine')   this._onRemoteMine(data);
      if(data.type==='request_map'&&this.isHost){
        // ホスト: マップデータを送信
        conn.send({type:'map_sync', tiles: this.mapData.map(row=>Array.from(row)), playerId:this._myId, seed:GS.day*1337+42});
      }
      if(data.type==='map_sync'){
        // ゲスト: ホストのマップを適用
        for(let y=0;y<MH;y++) this.mapData[y]=new Uint8Array(data.tiles[y]);
        this._buildTilemapFromData();
        this.showMsg('🗺️ マップ同期完了！',0x44FF44);
      }
      if(data.type==='chat'){
        this.showMsg('💬 '+data.msg,0xFFFFAA);
      }
    });
    conn.on('close',()=>{
      this._peerConn=null;
      this.showMsg('🔌 相手が切断しました',0xFF8844);
    });
  }

  _buildTilemapFromData(){
    // 既存レイヤー破棄して再構築
    if(this.layer){this.layer.destroy();}
    const flatData=[];
    for(let y=0;y<MH;y++)flatData.push(Array.from(this.mapData[y]));
    const map=this.make.tilemap({data:flatData,tileWidth:TS,tileHeight:TS});
    const tileset=map.addTilesetImage('tiles','tiles',TS,TS,0,0);
    this.layer=map.createLayer(0,tileset,0,0);
    this.layer.setDepth(1);
    this.collisionLayer=this.layer;
    const solidIds=Object.entries(BD).filter(([,d])=>d.solid).map(([id])=>parseInt(id));
    this.layer.setCollision(solidIds);
    for(const p of this.players) this.physics.add.collider(p.sprite,this.layer);
    for(const e of this.enemies) this.physics.add.collider(e.sprite,this.layer);
  }

  _broadcastState(){
    const p=this.players[0];if(!p||!this._peerConn)return;
    const payload={
      type:'state', playerId:this._myId,
      x:Math.round(p.sprite.x), y:Math.round(p.sprite.y),
      anim:p._animState||'idle', flip:!p.facingRight,
      hp:Math.round(p.hp), downed:p.downed,
    };
    try{this._peerConn.send(payload);}catch(e){}
  }

  _broadcastMine(tx,ty){
    if(!this._peerConn)return;
    try{this._peerConn.send({type:'mine',playerId:this._myId,tx,ty,block:T.AIR});}catch(e){}
  }

  _broadcastMineRestore(tx,ty,block){
    if(!this._peerConn)return;
    try{this._peerConn.send({type:'mine',playerId:this._myId,tx,ty,block});}catch(e){}
  }

  _onRemoteState(data){
    if(!data||data.playerId===this._myId)return;
    const id=data.playerId;
    this._remotePlayers[id]={x:data.x,y:data.y,anim:data.anim,flip:data.flip,hp:data.hp,downed:data.downed};
    // スプライト作成 or 更新
    if(!this._remoteSprites[id]){
      const sp=this.add.image(data.x,data.y,'player_idle').setScale(0.28).setDepth(10).setTint(0xFF9966);
      const tag=this.add.text(data.x,data.y-22,'🌐P2',{fontSize:'10px',color:'#FF9966',backgroundColor:'#000A',padding:{x:2,y:1}}).setOrigin(.5).setDepth(11);
      this._remoteSprites[id]={sprite:sp,tag};
    }
    const rs=this._remoteSprites[id];
    rs.sprite.setPosition(data.x,data.y).setFlipX(data.flip).setAlpha(data.downed?0.4:1);
    if(this.textures.exists('player_'+data.anim+'1'))rs.sprite.setTexture('player_'+data.anim+'1');
    else rs.sprite.setTexture('player_idle');
    rs.tag.setPosition(data.x,data.y-22);
  }

  _onRemoteMine(data){
    if(!data||data.playerId===this._myId)return;
    const {tx,ty,block=T.AIR}=data;
    if(this.mapData[ty]){
      this.mapData[ty][tx]=block;
      if(this.layer)this.layer.putTileAt(block,tx,ty);
    }
  }

  // ================================================================
  // 夜モード・地震・落石・ボス・自動機器
  // ================================================================

  _triggerEarthquake(){
    if(this.paused)return;
    this.cameras.main.shake(1500,0.018);
    this.showMsg('🌋 地震！崩落・帰り道が塞がる！',0xFF6600);
    const rng=()=>Math.random();
    // 天井崩落 + 帰り道を塞ぐ
    for(let i=0;i<18;i++){
      const tx=2+Math.floor(rng()*(MW-4));
      const ty=BIOMES[0].y1+5+Math.floor(rng()*80);
      if(this.mapData[ty]&&this.mapData[ty][tx]===T.AIR){
        if(this.mapData[ty-1]&&this.mapData[ty-1][tx]===T.DIRT){
          this._spawnRockAt(tx,ty-1);
        }
        // 確率で通路を土ブロックで塞ぐ (帰り道が塞がる)
        if(rng()<0.25){
          this.mapData[ty][tx]=T.DIRT;
          if(this.layer)this.layer.putTileAt(T.DIRT,tx,ty);
          if(GS.isOnline)this._broadcastMineRestore(tx,ty,T.DIRT);
        }
      }
    }
  }

  _spawnFallingRock(){
    if(this.paused||this.dayTimeLeft<10)return;
    // 深さ20タイル以下かつ天井がある場所からランダムに落石
    const tx=2+Math.floor(Math.random()*(MW-4));
    // プレイヤー近辺
    for(const p of this.players){
      if(p.downed)continue;
      const ptx=Math.floor(p.sprite.x/TS);
      const pty=Math.floor(p.sprite.y/TS);
      if(pty<BIOMES[0].y1+5)continue;
      const rtx=ptx+Math.floor(Math.random()*9)-4;
      for(let dy=-5;dy<0;dy++){
        const bt=this.mapData[pty+dy]?.[rtx];
        if(bt===T.STONE||bt===T.DIRT||bt===T.HARD){
          this._spawnRockAt(rtx,pty+dy);
          break;
        }
      }
    }
  }

  _spawnRockAt(tx,ty){
    const x=tx*TS+TS/2, y=ty*TS;
    const g=this.add.graphics().setDepth(9);
    g.fillStyle(0x808080,1);g.fillCircle(0,0,8);
    const rock=this.physics.add.existing(g);
    rock.body.setGravityY(400);
    rock.setPosition(x,y);
    this.fallingRocks.push(rock);
    // 3秒後に消去
    this.time.delayedCall(3000,()=>{
      if(rock.active){rock.destroy();this.fallingRocks=this.fallingRocks.filter(r=>r!==rock);}
    });
  }

  _updateFallingRocks(dt){
    for(const rock of this.fallingRocks){
      if(!rock.active)continue;
      // プレイヤーと衝突判定
      for(const p of this.players){
        if(p.downed)continue;
        const dx=Math.abs(rock.x-p.sprite.x);
        const dy=Math.abs(rock.y-p.sprite.y);
        if(dx<16&&dy<16){
          p.hp=Math.max(0,p.hp-12);
          rock.destroy();
          this.fallingRocks=this.fallingRocks.filter(r=>r!==rock);
          this.showMsg('💥 落石！',0xFF6600);
          if(p.hp<=0)p.downed=true;
          break;
        }
      }
      // 地面に当たったら止まる
      const ty=Math.floor(rock.y/TS);
      const tx=Math.floor(rock.x/TS);
      if(this.mapData[ty]&&BD[this.mapData[ty][tx]]?.solid){
        rock.body.setVelocity(0,0);
        rock.body.setGravityY(0);
      }
    }
  }

  _checkBossSpawn(){
    if(this.bossSpawned||this.bossDefeated||GS.bossDefeated)return;
    for(const p of this.players){
      const depth=Math.floor(p.sprite.y/TS)-BIOMES[0].y1;
      if(depth>=240){
        this._spawnBoss();
        break;
      }
    }
  }

  _spawnBoss(){
    this.bossSpawned=true;
    // ボスを最深部中央に配置
    const bossX=Math.floor(MW/2)*TS;
    const bossY=(BIOMES[8].y0+10)*TS;
    const boss=new Enemy(this,bossX,bossY,'boss');
    boss.hp=500; boss.maxHp=500; boss.dmg=35; boss.speed=80;
    this.physics.add.collider(boss.sprite,this.collisionLayer);
    this.enemies.push(boss);
    this._bossRef=boss;
    this.showMsg('💀 ボスが出現！！',0xFF0000);
    this.cameras.main.flash(600,255,0,0,false);
    this.cameras.main.shake(800,0.025);
    // ボス撃破検出
    this.time.addEvent({delay:1000,loop:true,callback:()=>{
      if(boss.dead&&!this.bossDefeated){
        this.bossDefeated=true; GS.bossDefeated=true;
        GS.gold+=5000;
        this.showMsg('🏆 ボス撃破！+5000G！目標達成！',0xFFD700);
        this.cameras.main.flash(1000,255,215,0,false);
      }
    }});
  }

  _autoMine(){
    // 自動採掘機: 深い鉱石を自動収集
    const items=['copper','iron'];
    const item=items[Math.floor(Math.random()*items.length)];
    GS.gold+=Math.floor(ITEMS[item].sell*(1+GS.baseLevel.autoMine*0.2));
    this.showMsg(`🤖 自動採掘: ${ITEMS[item].name}採取`,0x2ECC71);
  }

  _autoSell(){
    // 自動売却機: 最初のプレイヤーのアイテムを一部売却
    const p=this.players[0];
    if(!p)return;
    let earned=0;
    const sellLimit=GS.baseLevel.autoSell*3;
    let count=0;
    for(const[k,v]of Object.entries(p.inventory)){
      if(ITEMS[k]&&ITEMS[k].sell>0&&count<sellLimit){
        earned+=ITEMS[k].sell;
        p.removeItem(k,1);
        count++;
      }
    }
    if(earned>0){GS.gold+=earned; this.showMsg(`💰 自動売却: +${earned}G`,0xFFD700);}
  }

  _checkLeavingPartner(){
    if(this.players.length<2)return;
    const [p1,p2]=this.players;
    const p1Surface=p1.sprite.y/TS<BIOMES[0].y1+2;
    const p2Surface=p2.sprite.y/TS<BIOMES[0].y1+2;
    // 片方が地上、片方が地下かつどちらもダウンしていない
    if(p1Surface&&!p2Surface&&!p1.downed&&!p2.downed){
      if(!this._leaveWarned){
        this._leaveWarned=true;
        this.showMsg('⚠️ 仲間を置いて帰るとペナルティ！',0xFF4444);
        this.time.delayedCall(5000,()=>{
          if(p1.sprite.y/TS<BIOMES[0].y1+2&&p2.sprite.y/TS>BIOMES[0].y1+2){
            GS.gold=Math.floor(GS.gold*0.85);
            this.showMsg('💸 置き去りペナルティ！ゴールド-15%',0xFF0000);
          }
          this._leaveWarned=false;
        });
      }
    } else if(p2Surface&&!p1Surface&&!p1.downed&&!p2.downed){
      if(!this._leaveWarned){
        this._leaveWarned=true;
        this.showMsg('⚠️ 仲間を置いて帰るとペナルティ！',0xFF4444);
        this.time.delayedCall(5000,()=>{
          if(p2.sprite.y/TS<BIOMES[0].y1+2&&p1.sprite.y/TS>BIOMES[0].y1+2){
            GS.gold=Math.floor(GS.gold*0.85);
            this.showMsg('💸 置き去りペナルティ！ゴールド-15%',0xFF0000);
          }
          this._leaveWarned=false;
        });
      }
    } else {
      this._leaveWarned=false;
    }
  }

  _checkBuildingProximity(){
    for(const p of this.players){
      if(p.downed)continue;
      const px=p.sprite.x/TS, py=p.sprite.y/TS;
      if(py>BIOMES[0].y1+2)continue; // underground
      // Building zones
      const bldgs=[
        {name:'SELL',x:14,label:'[E] 売却所'},
        {name:'UPGRADE',x:22,label:'[E] 強化Shop'},
        {name:'QUEST',x:47,label:'[E] クエスト掲示板'},
        {name:'CRAFT',x:39,label:'[E] クラフト台'},
        {name:'WAREHOUSE',x:31,label:'[E] 倉庫'},
        {name:'OXYGEN',x:61,label:'[E] 酸素補給'},
      ];
      for(const b of bldgs){
        if(Math.abs(px-b.x)<3.5){
          this._nearBuilding=b.name;
          this._nearBldgLabel=b.label;
          return;
        }
      }
      this._nearBuilding=null; this._nearBldgLabel=null;
    }
  }

  _interact(pid){
    if(this.openMenu){this._closeMenu();return;}
    const p=this.players[pid]||this.players[0];
    if(!p)return;
    const py=p.sprite.y/TS;
    if(py>BIOMES[0].y1+3){
      // Underground: open inventory
      this._toggleMenu('inventory',pid);
      return;
    }
    // Surface buildings
    switch(this._nearBuilding){
      case 'SELL':    this._openSell(p); break;
      case 'UPGRADE': this._openUpgrade(p); break;
      case 'QUEST':   this._openQuest(); break;
      case 'CRAFT':   this._openCraft(p); break;
      case 'WAREHOUSE':this._openWarehouse(); break;
      case 'OXYGEN':  this._refillOxygen(p); break;
      default:        this._toggleMenu('inventory',pid);
    }
  }

  _pausePhysicsForMenu(){this.physics.pause();}
  _resumePhysicsFromMenu(){if(!this.openMenu)this.physics.resume();}

  _openSell(p){
    if(Object.keys(p.inventory).length===0){this.showMsg('持ち物がありません',0xFF8800);return;}
    this.openMenu='sell'; this._pausePhysicsForMenu();
    this.menuData={player:p};
    this.scene.get('UI').openSellMenu(p);
  }

  _openUpgrade(p){
    this.openMenu='upgrade'; this._pausePhysicsForMenu();
    this.menuData={player:p};
    this.scene.get('UI').openUpgradeMenu(p);
  }

  _openQuest(){
    this.openMenu='quest'; this._pausePhysicsForMenu();
    this.scene.get('UI').openQuestMenu(this.activeQuests);
  }

  _openCraft(p){
    this.openMenu='craft'; this._pausePhysicsForMenu();
    this.menuData={player:p};
    this.scene.get('UI').openCraftMenu(p);
  }

  _openWarehouse(){
    this.openMenu='warehouse'; this._pausePhysicsForMenu();
    this.scene.get('UI').openWarehouseMenu(GS.trophies);
  }

  _refillOxygen(p){
    const cost=20;
    if(GS.gold>=cost){GS.gold-=cost;p.oxygen=p.maxOxygen;p.battery=p.maxBattery;
      this.showMsg('🌬️ 酸素&電池補給完了！(-'+cost+'G)',0x87CEEB);}
    else this.showMsg('ゴールドが足りない！',0xFF4444);
  }

  _toggleMenu(type,pid){
    if(this.openMenu===type){this._closeMenu();}
    else{this.openMenu=type; this._pausePhysicsForMenu(); this.scene.get('UI').openInventoryMenu(this.players[pid]||this.players[0]);}
  }

  _closeMenu(){
    this.openMenu=null;
    this._resumePhysicsFromMenu();
    this.scene.get('UI').closeMenu();
  }

  showMsg(text,color=0xFFFFFF){
    const W=this.W;
    const t=this.add.text(W/2,80,text,
      {fontSize:'14px',color:'#'+color.toString(16).padStart(6,'0'),
       fontFamily:'monospace',backgroundColor:'#000000AA',padding:{x:8,y:4}})
      .setOrigin(.5).setScrollFactor(0).setDepth(100);
    this.tweens.add({targets:t,y:40,alpha:0,duration:2500,ease:'Power1',
      onComplete:()=>t.destroy()});
  }

  _checkQuests(){
    for(const q of this.activeQuests){
      if(q.done)continue;
      if(q.check(GS,this.players)){
        q.done=true; GS.gold+=q.reward; GS.questsDone++;
        this.showMsg(`✅ クエスト完了: ${q.text} +${q.reward}G`,0xFFD700);
        this.cameras.main.flash(400,255,215,0,false);
      }
    }
  }

  _endDay(){
    this.paused=true;
    this.physics.pause();
    this.scene.get('UI').events.emit('endDay');
    this.time.delayedCall(800,()=>{
      this.scene.stop('UI');
      this.scene.start('Summary',{
        players:this.players.map(p=>({
          deepest:p.deepest,
          inventory:p.inventory,
          gold:GS.gold,
        })),
        quests:this.activeQuests,
        day:GS.day,
      });
    });
  }
}

// ================================================================
// SCENE: UI (HUD overlay)
// ================================================================
class UIScene extends Phaser.Scene{
  constructor(){super('UI');}
  init(data){this.world=data.world;}

  create(){
    this.W=this.scale.width||window.innerWidth;
    this.H=this.scale.height||window.innerHeight;
    this.menuOpen=false;
    this.menuContainer=null;

    // HUD background
    this.hudBg=this.add.graphics();
    this.p1Texts=this._makePlayerHUD(0,10,10);
    this.p2Texts=this._makePlayerHUD(1,this.W/2+10,10);

    // Day timer
    this.timerText=this.add.text(this.W/2,8,'',
      {fontSize:'14px',color:'#FFF',fontFamily:'monospace',backgroundColor:'#000A',padding:{x:6,y:2}})
      .setOrigin(.5,0).setDepth(90);

    // Biome indicator
    this.biomeText=this.add.text(this.W/2,this.H-22,'',
      {fontSize:'11px',color:'#CCC',fontFamily:'monospace',backgroundColor:'#0008',padding:{x:4,y:2}})
      .setOrigin(.5,1).setDepth(90);

    // Interaction hint
    this.hintText=this.add.text(this.W/2,this.H-44,'',
      {fontSize:'12px',color:'#FFD700',fontFamily:'monospace',backgroundColor:'#000A',padding:{x:6,y:3}})
      .setOrigin(.5,1).setDepth(90);

    // Minimap
    this.minimapGfx=this.add.graphics().setDepth(91);
    this.minimapBg=this.add.graphics().setDepth(90);
    this._drawMinimapBg();

    this.events.on('endDay',()=>{
      this.timerText.setText('⏰ 帰還中...');
    });
  }

  _makePlayerHUD(pid,x,y){
    const col=pid===0?'#88AAFF':'#FF8866';
    const style={fontSize:'11px',color:col,fontFamily:'monospace',
      backgroundColor:'#000C',padding:{x:3,y:2}};
    return{
      hp:   this.add.text(x,y,    '',style).setDepth(90),
      st:   this.add.text(x,y+18, '',style).setDepth(90),
      ox:   this.add.text(x,y+36, '',style).setDepth(90),

  update(){
    const world=this.scene.get('World');
    if(!world||!world.players)return;

    // Update player HUDs
    world.players.forEach((p,i)=>{
      if(i>1)return;
      const h=i===0?this.p1Texts:this.p2Texts;
      const bar=(v,m,len=10)=>{const f=Math.round((v/m)*len);return '█'.repeat(f)+'░'.repeat(len-f);};
      h.hp.setText(`❤️ ${bar(p.hp,p.maxHp,8)} ${Math.ceil(p.hp)}`);
      h.st.setText(`⚡ ${bar(p.stamina,p.maxStamina,8)}`);
      h.ox.setText(`🌬 ${bar(p.oxygen,p.maxOxygen,8)}`);
      h.bat.setText(`🔦 ${bar(p.battery,p.maxBattery,8)}`);
      h.wt.setText(`🎒 ${p.totalWeight()}/${p.maxWeight}kg`);
      h.gold.setText(`💰 ${GS.gold}G`);
      const depth=Math.max(0,Math.floor(p.sprite.y/TS)-BIOMES[0].y1);
      h.depth.setText(`📍 深${depth}m`);
      const roleIcon={miner:'⛏',fighter:'⚔️',normal:'⚡'}[p.role]||'⚡';
      h.tool.setText(`${roleIcon}${p.role||'normal'} | 🔧${p.tool}${p.mineTarget?` (${Math.round(p.mineProgress*10)/10})`:''}`);
      if(!this._onlineTxt&&GS.isOnline){
        this._onlineTxt=this.add.text(this.W/2,this.H-14,'🌐 ONLINE: Room '+GS.onlineRoom,
          {fontSize:'10px',color:'#44FF88',fontFamily:'monospace',backgroundColor:'#0008',padding:{x:4,y:2}})
          .setOrigin(.5,1).setDepth(90).setScrollFactor(0);
      }
    });

    // Day timer
    const m=Math.floor(world.dayTimeLeft/60);
    const s=world.dayTimeLeft%60;
    const col=world.dayTimeLeft<60?'#FF4444':world.dayTimeLeft<120?'#FFAA00':'#FFFFFF';
    this.timerText.setText(`Day ${GS.day}  ⏱ ${m}:${String(s).padStart(2,'0')}`).setColor(col);

    // Biome + 夜モード
    const camY=world.cameras.main.scrollY;
    const b=getBiome(Math.floor(camY/TS));
    const nightTag=world.nightMode?'  🌙夜モード危険！':'';
    this.biomeText.setText(`【${b.name}】${nightTag}`);
    if(world.nightMode) this.biomeText.setColor('#FF6600');
    else this.biomeText.setColor('#CCCCCC');

    // ボス出現警告
    if(world.bossSpawned&&!world.bossDefeated){
      this.timerText.setColor('#FF0000');
    }

    // Interaction hint
    this.hintText.setText(world._nearBldgLabel||'');

    // Minimap
    this._updateMinimap(world);
  }

  _updateMinimap(world){
    const mx=this.W-74, my=10, mw=64, mh=80;
    this.minimapGfx.clear();
    if(!world.players)return;

    // カメラ範囲を薄く表示
    const camTy=Math.floor(world.cameras.main.scrollY/TS);
    const camTx=Math.floor(world.cameras.main.scrollX/TS);
    const viewW=Math.ceil(20/world.cameras.main.zoom);
    const viewH=Math.ceil(14/world.cameras.main.zoom);
    this.minimapGfx.fillStyle(0xFFFFFF,0.08);
    this.minimapGfx.fillRect(
      mx+Math.floor((camTx/MW)*mw),my+Math.floor((camTy/MH)*mh),
      Math.ceil((viewW/MW)*mw),Math.ceil((viewH/MH)*mh)
    );

    // 自分・仲間プレイヤー（迷子でもミニマップには表示）
    const pColors=[0x4488FF,0xFF6644,0x44FF44,0xFF44FF];
    for(const p of world.players){
      const ptx=Math.floor(p.sprite.x/TS);
      const pty=Math.floor(p.sprite.y/TS);
      const mmx=mx+Math.floor((ptx/MW)*mw);
      const mmy=my+Math.floor((pty/MH)*mh);
      const col=pColors[p.id]||0xFFFFFF;
      this.minimapGfx.fillStyle(col,p.downed?0.4:1);
      this.minimapGfx.fillTriangle(mmx,mmy-4, mmx-3,mmy+2, mmx+3,mmy+2); // 三角マーカー

      // 他プレイヤーが画面外の場合: ラベル強調
      const screenX=p.sprite.x-world.cameras.main.scrollX;
      const screenY=p.sprite.y-world.cameras.main.scrollY;
      if(screenX<0||screenX>world.W||screenY<0||screenY>world.H){
        this.minimapGfx.lineStyle(2,col,0.9);
        this.minimapGfx.strokeRect(mmx-4,mmy-5,8,8);
      }
    }

    // オンラインリモートプレイヤー
    if(GS.isOnline&&world._remotePlayers){
      for(const[id,rp]of Object.entries(world._remotePlayers)){
        const rtx=Math.floor((rp.x||0)/TS);
        const rty=Math.floor((rp.y||0)/TS);
        const mmx=mx+Math.floor((rtx/MW)*mw);
        const mmy=my+Math.floor((rty/MH)*mh);
        this.minimapGfx.fillStyle(0xFF9900,1);
        this.minimapGfx.fillTriangle(mmx,mmy-4, mmx-3,mmy+2, mmx+3,mmy+2);
      }
    }
    // Enemies as red dots
    if(world.enemies){
      for(const e of world.enemies){
        if(e.dead)continue;
        const etx=Math.floor(e.sprite.x/TS);
        const ety=Math.floor(e.sprite.y/TS);
        const mmx=mx+Math.floor((etx/MW)*mw);
        const mmy=my+Math.floor((ety/MH)*mh);
        if(Math.abs(ety-(world.players[0]?.sprite.y/TS||0))<30){
          this.minimapGfx.fillStyle(0xFF0000,.6);
          this.minimapGfx.fillRect(mmx-1,mmy-1,3,3);
        }
      }
    }
    // Chests as yellow
    for(let y=camTy-10;y<camTy+40;y++){
      if(y<0||y>=MH)continue;
      for(let x=0;x<MW;x++){
        if(world.mapData[y][x]===T.CHEST){
          const mmx=mx+Math.floor((x/MW)*mw);
          const mmy=my+Math.floor((y/MH)*mh);
          this.minimapGfx.fillStyle(0xDAA520,.8);
          this.minimapGfx.fillRect(mmx-1,mmy-1,3,3);
        }
      }
    }
  }
